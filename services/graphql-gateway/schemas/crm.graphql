extend schema
  @link(url: "https://specs.apollo.dev/federation/v2.0", import: ["@key", "@shareable", "@external"])

type Query {
  contacts(limit: Int, offset: Int): [Contact!]!
  contact(id: ID!): Contact
  accounts(limit: Int, offset: Int): [Account!]! @shareable
  account(id: ID!): Account @shareable
  deals(limit: Int, offset: Int): [Deal!]!
  deal(id: ID!): Deal
  activities(limit: Int, offset: Int): [Activity!]!
  activity(id: ID!): Activity
  pipelines(limit: Int, offset: Int): [Pipeline!]!
  pipeline(id: ID!): Pipeline
  stages(pipelineId: ID!): [Stage!]!
  stage(id: ID!): Stage
  notes(limit: Int, offset: Int): [Note!]!
  note(id: ID!): Note
  leads(limit: Int, offset: Int): [Lead!]!
  lead(id: ID!): Lead
}

type Mutation {
  createContact(input: CreateContactInput!): Contact!
  updateContact(id: ID!, input: UpdateContactInput!): Contact!
  deleteContact(id: ID!): Boolean!
  createAccount(input: CreateAccountInput!): Account!
  updateAccount(id: ID!, input: UpdateAccountInput!): Account!
  deleteAccount(id: ID!): Boolean!
  createDeal(input: CreateDealInput!): Deal!
  updateDeal(id: ID!, input: UpdateDealInput!): Deal!
  deleteDeal(id: ID!): Boolean!
  createActivity(input: CreateActivityInput!): Activity!
  updateActivity(id: ID!, input: UpdateActivityInput!): Activity!
  deleteActivity(id: ID!): Boolean!
  createPipeline(input: CreatePipelineInput!): Pipeline!
  updatePipeline(id: ID!, input: UpdatePipelineInput!): Pipeline!
  deletePipeline(id: ID!): Boolean!
  createStage(input: CreateStageInput!): Stage!
  updateStage(id: ID!, input: UpdateStageInput!): Stage!
  deleteStage(id: ID!): Boolean!
  createNote(input: CreateNoteInput!): Note!
  updateNote(id: ID!, input: UpdateNoteInput!): Note!
  deleteNote(id: ID!): Boolean!
  createLead(input: CreateLeadInput!): Lead!
  updateLead(id: ID!, input: UpdateLeadInput!): Lead!
  deleteLead(id: ID!): Boolean!
}

type Contact @key(fields: "id") {
  id: ID!
  tenantId: ID!
  ownerId: ID!
  accountId: ID
  firstName: String!
  lastName: String!
  email: String
  phone: String
  mobile: String
  jobTitle: String
  department: String
  linkedInUrl: String
  twitterHandle: String
  country: String
  city: String
  address: String
  timezone: String
  preferredChannel: String
  doNotEmail: Boolean!
  doNotCall: Boolean!
  gdprConsent: Boolean!
  gdprConsentAt: DateTime
  lastContactedAt: DateTime
  customFields: JSON
  tags: [String!]!
  isActive: Boolean!
  dataQualityScore: Int
  createdAt: DateTime!
  updatedAt: DateTime! @shareable
}

type Account @key(fields: "id") {
  id: ID!
  tenantId: ID! @shareable
  ownerId: ID!
  parentAccountId: ID
  name: String!
  website: String
  phone: String
  email: String
  industry: String
  type: String!
  tier: String! @shareable
  status: String!
  annualRevenue: Float @shareable
  employeeCount: Int
  country: String
  city: String
  address: String
  zipCode: String
  linkedInUrl: String
  description: String
  sicCode: String
  naicsCode: String
  healthScore: Int
  npsScore: Int
  customFields: JSON
  lat: Float
  lng: Float
  tags: [String!]!
  dataQualityScore: Int
  deletedAt: DateTime
  createdAt: DateTime!
  updatedAt: DateTime! @shareable
}

type Deal @key(fields: "id") {
  id: ID!
  tenantId: ID!
  ownerId: ID!
  accountId: ID!
  pipelineId: ID!
  stageId: ID!
  name: String!
  amount: Float!
  currency: String!
  probability: Int!
  expectedCloseDate: DateTime
  actualCloseDate: DateTime
  status: String!
  lostReason: String
  lostDetail: String
  forecastCategory: String!
  meddicicScore: Int!
  meddicicData: JSON
  aiWinProbability: Float
  aiInsights: JSON
  competitors: [String!]!
  source: String
  campaignId: ID
  customFields: JSON
  tags: [String!]!
  version: Int!
  closeReason: String
  dataQualityScore: Int
  deletedAt: DateTime
  createdAt: DateTime!
  updatedAt: DateTime!
}

type Pipeline @key(fields: "id") {
  id: ID!
  tenantId: ID!
  name: String!
  type: String!
  currency: String!
  isDefault: Boolean!
