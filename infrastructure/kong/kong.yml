_format_version: '3.0'

services:
  - name: auth-service
    url: http://auth-service:3010
    routes:
      - name: auth-routes
        paths:
          - /api/v1/auth
          - /api/v1/users
          - /api/v1/tenants
          - /api/v1/roles
          - /api/v1/api-keys
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 60
          policy: local

  - name: crm-service
    url: http://crm-service:3001
    routes:
      - name: crm-routes
        paths:
          - /api/v1/deals
          - /api/v1/accounts
          - /api/v1/contacts
          - /api/v1/leads
          - /api/v1/pipelines
          - /api/v1/activities
          - /api/v1/notes
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 200
          policy: local

  - name: finance-service
    url: http://finance-service:3002
    routes:
      - name: finance-routes
        paths:
          - /api/v1/quotes
