apiVersion: v2
name: nexus-auth
description: A Helm chart for Nexus CRM microservices
type: application
version: 1.0.0
appVersion: "1.0.0"
dependencies:
  - name: postgresql
    version: "15.5.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  - name: redis
    version: "19.6.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
  - name: kafka
    version: "29.3.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: kafka.enabled
