headers:
  all:
    request:
      - propagate:
          matching: "authorization"
      - propagate:
          matching: "x-tenant-id"
      - propagate:
          matching: "x-user-id"
      - propagate:
          matching: "x-request-id"

coprocessor:
  url: http://router-coprocessor:4001/coprocessor
  timeout: 2s
  stages:
    - RouterRequest
    - RouterResponse

telemetry:
  apollo:
    endpoint: https://usage-reporting.api.apollographql.com/api/ingress/traces
    apollo_key: ${APOLLO_KEY}
    apollo_graph_ref: nexus-crm@current
    schema_config_delivery_endpoint: https://uplink.api.apollographql.com/
  metrics:
    prometheus:
      enabled: true
      listen: 0.0.0.0:9090
  tracing:
    jaeger:
      enabled: true
      endpoint: "http://jaeger:14268/api/traces"
