name: CI

on:
  push:
    # `fix/local-boot` is the current working branch — CI runs on pushes to it
    # in addition to the long-lived branches. Add/remove working branches here.
    branches: [main, develop, fix/local-boot]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

env:
  # Node 22: @sparticuz/chromium needs >=22.17 and posthog-node >=22.22;
  # setup-node '22' resolves the latest 22.x which satisfies both.
  NODE_VERSION: '22'
  # Must match package.json "packageManager" exactly — pnpm/action-setup@v4
  # hard-fails on any mismatch, which kills every job at setup.
  PNPM_VERSION: '9.1.0'

jobs:
  quality:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # Services import generated Prisma clients (node_modules/.prisma/*);
      # a clean runner has none until db:generate runs.
      - name: Generate Prisma clients
        run: pnpm db:generate
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Event contract guard
        run: pnpm events:check

  a11y:
    name: Accessibility (jsx-a11y)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # next/core-web-vitals bundles eslint-plugin-jsx-a11y; this named gate makes
      # accessibility a first-class required check on the web app. WCAG-AA runtime
      # (axe) checks over the built app are a follow-up (needs a running server in CI).
      - name: Accessibility lint (web)
        run: pnpm --filter @nexus/web exec next lint --max-warnings=0

  a11y-runtime:
    name: Accessibility (axe runtime)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browser (chromium)
        run: pnpm --filter @nexus/web exec playwright install --with-deps chromium
      # apps/web imports @nexus/validation (zod schemas) as a value, so the
      # workspace package dists must exist before `next build` resolves them
      # (same reason the web Dockerfile builds ./packages/** first).
      - name: Build workspace packages
        run: pnpm --filter "./packages/**" run build
      # Build the web app once; the a11y run serves this production build via
      # Playwright's webServer (PLAYWRIGHT_WEB_SERVER_CMD=pnpm start below).
      - name: Build web app
        run: pnpm --filter @nexus/web build
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: 1
      # Runtime WCAG 2 A/AA gate: injects axe-core into the running app and
      # asserts zero violations on the login + core authenticated routes.
      # Only the a11y spec runs, only on chromium (the browser installed above).
      - name: Run axe accessibility spec (web)
        run: pnpm --filter @nexus/web exec playwright test e2e/a11y.spec.ts --project=chromium
        env:
          CI: 'true'
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: 1
          # Serve the production build we just made instead of `pnpm dev`.
          PLAYWRIGHT_WEB_SERVER_CMD: pnpm start
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-a11y-report
          path: apps/web/playwright-report
          retention-days: 7

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # The full suite (133 files) runs with ZERO external infrastructure —
    # every dependency is mocked or env-guarded. Do not add service
    # containers back here; a test that needs live infra belongs behind
    # TEST_INFRA=1, not in this gate.
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # Root `pnpm test` invokes vitest directly (not via turbo), so the
      # workspace package dists and generated Prisma clients that tests
      # resolve must be produced explicitly first.
      - name: Generate Prisma clients
        run: pnpm db:generate
      - name: Build workspace packages
        run: pnpm --filter "./packages/**" run build
      - name: Run tests
        run: pnpm test
        env:
          NODE_ENV: test
          JWT_SECRET: ${{ secrets.CI_JWT_SECRET || 'test-jwt-placeholder-replace-with-secret-min-32-chars' }}
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: '**/coverage/**'
          retention-days: 7

  build:
    name: Build Packages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma clients
        run: pnpm db:generate
      - name: Build all packages and services
        run: pnpm build
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: 1
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            apps/web/.next/standalone
            services/*/dist
            packages/*/dist
          retention-days: 3

  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [quality, test, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - context: apps/web
            image: web
          - context: services/auth-service
            image: auth-service
          - context: services/crm-service
            image: crm-service
          - context: services/finance-service
            image: finance-service
          - context: services/billing-service
            image: billing-service
          - context: services/activities-service
            image: activities-service
          - context: services/notes-service
            image: notes-service
          - context: services/notification-service
            image: notification-service
          - context: services/realtime-service
            image: realtime-service
          - context: services/search-service
            image: search-service
          - context: services/workflow-service
            image: workflow-service
          - context: services/integration-service
            image: integration-service
          - context: services/blueprint-service
            image: blueprint-service
          - context: services/approval-service
            image: approval-service
          - context: services/data-service
            image: data-service
          - context: services/document-service
            image: document-service
          - context: services/chatbot-service
            image: chatbot-service
          - context: services/cadence-service
            image: cadence-service
          - context: services/campaign-service
            image: campaign-service
          - context: services/territory-service
            image: territory-service
          - context: services/planning-service
            image: planning-service
          - context: services/reporting-service
            image: reporting-service
          - context: services/portal-service
            image: portal-service
          - context: services/knowledge-service
            image: knowledge-service
          - context: services/incentive-service
            image: incentive-service
          - context: services/graphql-gateway
            image: graphql-gateway
          - context: services/comm-service
            image: comm-service
          - context: services/storage-service
            image: storage-service
          - context: services/ticket-service
            image: ticket-service
          - context: services/email-sync-service
            image: email-sync-service
          - context: services/analytics-service
            image: analytics-service
          - context: services/metadata-service
            image: metadata-service
          - context: services/audit-consumer
            image: audit-consumer
          - context: services/outbox-relay
            image: outbox-relay
          - context: services/router-coprocessor
            image: router-coprocessor
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./${{ matrix.context }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/nexus-${{ matrix.image }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/nexus-${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
      # TODO: Sign images with cosign for supply-chain security
      # - uses: sigstore/cosign-installer@v3
      # - run: cosign sign --yes ghcr.io/${{ github.repository_owner }}/nexus-${{ matrix.image }}:${{ github.sha }}
      # TODO: Generate SBOM with syft or trivy
      # - uses: anchore/sbom-action@v0
      #   with:
      #     image: ghcr.io/${{ github.repository_owner }}/nexus-${{ matrix.image }}:${{ github.sha }}

  load-test:
    name: Load Testing
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Run K6 load tests
        uses: grafana/k6-action@v0.3.0
        with:
          filename: tests/load/api-load-test.js
        env:
          K6_PROMETHEUS_RW_SERVER_URL: ${{ secrets.PROMETHEUS_REMOTE_WRITE_URL }}
          K6_PROMETHEUS_RW_USERNAME: ${{ secrets.PROMETHEUS_USERNAME }}
          K6_PROMETHEUS_RW_PASSWORD: ${{ secrets.PROMETHEUS_PASSWORD }}

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  smoke-test-staging:
    name: Smoke Test Staging Images
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: read
    steps:
      - name: Verify images in registry
        run: |
          # Quick smoke test: verify a critical image manifest exists in GHCR
          TOKEN=$(curl -s -u "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            "https://ghcr.io/token?service=ghcr.io&scope=repository:${{ github.repository_owner }}/nexus-web:pull" | jq -r .token)
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            "https://ghcr.io/v2/${{ github.repository_owner }}/nexus-web/manifests/${{ github.sha }}")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Image manifest check failed with HTTP $HTTP_CODE"
            exit 1
          fi
          echo "✅ Staging images verified in registry"
      # Note: full staging deployment smoke tests run automatically in
      # deploy-staging.yml via workflow_run after this CI workflow completes.
