# Nexus Workflow Add Or Update Api Endpoint

## Action

Follow the add-or-update-api-endpoint workflow:
1. Create or modify route handler file for the endpoint.
2. Register new route in the service's router/index or API directory.
3. If permissions needed: add requirePermission or guards.
4. If rate limiting needed: add @fastify/rate-limit.
5. If new business logic: update or create service logic.
6. If frontend: create or update corresponding API route file.
7. Add or update tests for the endpoint.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~4x per month
- Files: services/*/src/routes/*.ts, services/*/src/index.ts, apps/web/src/app/api/**/*.ts

