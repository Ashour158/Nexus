version: '3.9'

services:
  # ─── Infrastructure ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexus
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nexus -d nexus']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    command: ['redis-server', '--requirepass', 'nexus']
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'nexus', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: nexus-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: nexus-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - '9092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT_INTERNAL'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    volumes:
      - kafka_data:/var/lib/kafka/data

  meilisearch:
    image: getmeili/meilisearch:v1.8
    container_name: nexus-meilisearch
    restart: unless-stopped
    ports:
      - '7700:7700'
    environment:
      MEILI_MASTER_KEY: nexus-dev
      MEILI_ENV: development
    volumes:
      - meilisearch_data:/meili_data

  minio:
    image: minio/minio:latest
    container_name: nexus-minio
    restart: unless-stopped
    command: ['server', '/data', '--console-address', ':9001']
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: nexus
      MINIO_ROOT_PASSWORD: nexus-minio
    volumes:
      - minio_data:/data

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: nexus-keycloak
    restart: unless-stopped
    command: ['start-dev']
    ports:
      - '8080:8080'
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/nexus
      KC_DB_USERNAME: nexus
      KC_DB_PASSWORD: nexus
    depends_on:
      postgres:
        condition: service_healthy

  # ─── App Services ───────────────────────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: ./services/auth-service/Dockerfile
    container_name: nexus-auth
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      PORT: '3000'
    env_file:
      - ./services/auth-service/.env.example
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started

  crm-service:
    build:
      context: .
      dockerfile: ./services/crm-service/Dockerfile
    container_name: nexus-crm
    restart: unless-stopped
    ports:
      - '3001:3001'
    env_file:
      - ./services/crm-service/.env.example
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  finance-service:
    build:
      context: .
      dockerfile: ./services/finance-service/Dockerfile
    container_name: nexus-finance
    restart: unless-stopped
    ports:
      - '3002:3002'
    env_file:
      - ./services/finance-service/.env.example
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  notification-service:
    build:
      context: .
      dockerfile: ./services/notification-service/Dockerfile
    container_name: nexus-notifications
    restart: unless-stopped
    ports:
      - '3003:3003'
    env_file:
      - ./services/notification-service/.env.example
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  realtime-service:
    build:
      context: .
      dockerfile: ./services/realtime-service/Dockerfile
    container_name: nexus-realtime
    restart: unless-stopped
    ports:
      - '3005:3005'
    env_file:
      - ./services/realtime-service/.env.example
    depends_on:
      kafka:
        condition: service_started
      redis:
        condition: service_healthy

  search-service:
    build:
      context: .
      dockerfile: ./services/search-service/Dockerfile
    container_name: nexus-search
    restart: unless-stopped
    ports:
      - '3006:3006'
    env_file:
      - ./services/search-service/.env.example
    depends_on:
      kafka:
        condition: service_started
      meilisearch:
        condition: service_started

  workflow-service:
    build:
      context: .
      dockerfile: ./services/workflow-service/Dockerfile
    container_name: nexus-workflow
    restart: unless-stopped
    ports:
      - '3007:3007'
    env_file:
      - ./services/workflow-service/.env.example
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  billing-service:
    build:
      context: .
      dockerfile: ./services/billing-service/Dockerfile
    container_name: nexus-billing
    restart: unless-stopped
    ports:
      - '3011:3011'
    env_file:
      - ./services/billing-service/.env.example
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  integration-service:
    build:
      context: .
      dockerfile: ./services/integration-service/Dockerfile
    container_name: nexus-integration
    restart: unless-stopped
    ports:
      - '3012:3012'
    env_file:
      - ./services/integration-service/.env.example
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  blueprint-service:
    build:
      context: .
      dockerfile: ./services/blueprint-service/Dockerfile
    container_name: nexus-blueprint
    restart: unless-stopped
    ports:
      - '3013:3013'
    env_file:
      - ./services/blueprint-service/.env.example
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  analytics-service:
    build:
      context: .
      dockerfile: ./services/analytics-service/Dockerfile
    container_name: nexus-analytics
    restart: unless-stopped
    ports:
      - '3008:3008'
    env_file:
      - ./services/analytics-service/.env.example
    depends_on:
      kafka:
        condition: service_started
      clickhouse:
        condition: service_started

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: nexus-clickhouse
    restart: unless-stopped
    ports:
      - '8123:8123'
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./services/analytics-service/src/ddl/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    container_name: nexus-web
    restart: unless-stopped
    ports:
      - '3100:3000'
    env_file:
      - ./apps/web/.env.example
    depends_on:
      - auth-service
      - crm-service
      - finance-service
      - notification-service
      - realtime-service
      - search-service
      - workflow-service
      - analytics-service
      - comm-service
      - storage-service
      - billing-service
      - integration-service
      - blueprint-service

  comm-service:
    build:
      context: .
      dockerfile: ./services/comm-service/Dockerfile
    container_name: nexus-comm
    restart: unless-stopped
    ports:
      - '3009:3009'
    env_file:
      - ./services/comm-service/.env.example
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  storage-service:
    build:
      context: .
      dockerfile: ./services/storage-service/Dockerfile
    container_name: nexus-storage
    restart: unless-stopped
    ports:
      - '3010:3010'
    env_file:
      - ./services/storage-service/.env.example
    depends_on:
      postgres:
        condition: service_healthy

  approval-service:
    build:
      context: .
      dockerfile: ./services/approval-service/Dockerfile
    container_name: nexus-approval
    restart: unless-stopped
    ports:
      - '3014:3014'
    environment:
      PORT: '3014'
    env_file:
      - ./services/approval-service/.env.example
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  data-service:
    build:
      context: .
      dockerfile: ./services/data-service/Dockerfile
    container_name: nexus-data
    restart: unless-stopped
    ports:
      - '3015:3015'
    environment:
      PORT: '3015'
    env_file:
      - ./services/data-service/.env.example
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  document-service:
    build:
      context: .
      dockerfile: ./services/document-service/Dockerfile
    container_name: nexus-document
    restart: unless-stopped
    ports:
      - '3016:3016'
    environment:
      PORT: '3016'
    env_file:
      - ./services/document-service/.env.example
    depends_on:
      - finance-service

  chatbot-service:
    build:
      context: .
      dockerfile: ./services/chatbot-service/Dockerfile
    container_name: nexus-chatbot
    restart: unless-stopped
    ports:
      - '3017:3017'
    environment:
      PORT: '3017'
    env_file:
      - ./services/chatbot-service/.env.example
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  cadence-service:
    build:
      context: .
      dockerfile: ./services/cadence-service/Dockerfile
    container_name: nexus-cadence
    restart: unless-stopped
    ports:
      - '3018:3018'
    environment:
      PORT: '3018'
    env_file:
      - ./services/cadence-service/.env.example
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  territory-service:
    build:
      context: .
      dockerfile: ./services/territory-service/Dockerfile
    container_name: nexus-territory
    restart: unless-stopped
    ports:
      - '3019:3019'
    environment:
      PORT: '3019'
    env_file:
      - ./services/territory-service/.env.example
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  planning-service:
    build:
      context: .
      dockerfile: ./services/planning-service/Dockerfile
    container_name: nexus-planning
    restart: unless-stopped
    ports:
      - '3020:3020'
    environment:
      PORT: '3020'
    env_file:
      - ./services/planning-service/.env.example
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  reporting-service:
    build:
      context: .
      dockerfile: ./services/reporting-service/Dockerfile
    container_name: nexus-reporting
    restart: unless-stopped
    ports:
      - '3021:3021'
    environment:
      PORT: '3021'
    env_file:
      - ./services/reporting-service/.env.example
    depends_on:
      postgres:
        condition: service_healthy

  portal-service:
    build:
      context: .
      dockerfile: ./services/portal-service/Dockerfile
    container_name: nexus-portal
    restart: unless-stopped
    ports:
      - '3022:3022'
    environment:
      PORT: '3022'
    env_file:
      - ./services/portal-service/.env.example
    depends_on:
      postgres:
        condition: service_healthy

  knowledge-service:
    build:
      context: .
      dockerfile: ./services/knowledge-service/Dockerfile
    container_name: nexus-knowledge
    restart: unless-stopped
    ports:
      - '3023:3023'
    environment:
      PORT: '3023'
    env_file:
      - ./services/knowledge-service/.env.example
    depends_on:
      postgres:
        condition: service_healthy

  incentive-service:
    build:
      context: .
      dockerfile: ./services/incentive-service/Dockerfile
    container_name: nexus-incentive
    restart: unless-stopped
    ports:
      - '3024:3024'
    environment:
      PORT: '3024'
    env_file:
      - ./services/incentive-service/.env.example
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  ai-service:
    build:
      context: .
      dockerfile: ./services/ai-service/Dockerfile
    container_name: nexus-ai
    restart: unless-stopped
    ports:
      - '3025:8000'
    env_file:
      - ./services/ai-service/.env.example

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: nexus-prometheus
    restart: unless-stopped
    ports:
      - '9090:9090'
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'

  grafana:
    image: grafana/grafana:10.4.0
    container_name: nexus-grafana
    restart: unless-stopped
    ports:
      - '3200:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: nexus-grafana
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

  nginx:
    image: nginx:1.25-alpine
    container_name: nexus-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - web
      - auth-service
      - crm-service

volumes:
  postgres_data:
  redis_data:
  zookeeper_data:
  kafka_data:
  meilisearch_data:
  minio_data:
  clickhouse_data:
  prometheus_data:
  grafana_data: