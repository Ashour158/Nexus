apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nexus-crm-cluster-role
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nexus-crm-cluster-role-binding
subjects:
  - kind: ServiceAccount
    name: nexus-crm
    namespace: nexus
roleRef:
  kind: ClusterRole
  name: nexus-crm-cluster-role
  apiGroup: rbac.authorization.k8s.io
