# Nexus starter alert rules.
# Conservative thresholds — tune per environment. Loaded via prometheus.yml `rule_files`.
# Metric names come from packages/service-utils (nexus_http_* + prom-client defaults).
# `severity` labels route in alertmanager.yml: critical -> PagerDuty, warning -> Slack.
groups:
  - name: nexus-availability
    rules:
      # A scrape target has been unreachable for >2m (process down / not listening).
      - alert: TargetDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: 'Target {{ $labels.job }}/{{ $labels.instance }} is down'
          description: 'Prometheus has failed to scrape {{ $labels.instance }} (job {{ $labels.job }}) for more than 2 minutes.'

      # A service process has restarted repeatedly — likely a crash loop.
      # process_start_time_seconds is a prom-client default (no cadvisor/node-exporter deployed).
      - alert: ServiceRestarting
        expr: changes(process_start_time_seconds[15m]) > 2
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: 'Service {{ if $labels.service }}{{ $labels.service }}{{ else }}{{ $labels.instance }}{{ end }} is restarting'
          description: '{{ $labels.instance }} has restarted more than twice in the last 15 minutes (possible crash loop).'

  - name: nexus-http
    rules:
      # >5% of requests returning 5xx over the last 5 minutes.
      # Denominator is naturally >0 only when there is traffic, so idle services don't fire.
      - alert: HighHttp5xxRate
        expr: |
          sum by (service) (rate(nexus_http_requests_total{status_code=~"5.."}[5m]))
            /
          sum by (service) (rate(nexus_http_requests_total[5m]))
            > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'High 5xx rate on {{ $labels.service }}'
          description: '{{ $labels.service }} is serving more than 5% 5xx responses over the last 5 minutes.'

      # p95 request latency above 1s for 10 minutes.
      - alert: HighRequestLatency
        expr: |
          histogram_quantile(
            0.95,
            sum by (le, service) (rate(nexus_http_request_duration_seconds_bucket[5m]))
          ) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 'High p95 latency on {{ $labels.service }}'
          description: 'p95 request latency for {{ $labels.service }} has exceeded 1s for 10 minutes.'
