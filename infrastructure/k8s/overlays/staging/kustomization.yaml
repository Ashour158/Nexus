apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: nexus-staging

resources:
  - ../../base

patches:
  - path: replicas-patch.yaml
  - path: resources-patch.yaml

configMapGenerator:
  - name: nexus-config
    behavior: merge
    literals:
      - NODE_ENV=staging
      - LOG_LEVEL=debug

images:
  - name: nexus-crm/nexus-crm
    newTag: staging
