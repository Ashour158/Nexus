# Apollo Router Configuration — PRODUCTION
# Only the auth subgraph is active; all other services are REST APIs.
# Re-enable a subgraph only after that service exposes a real GraphQL endpoint.

server:
  listen: 0.0.0.0:4000
  introspection: false

cors:
  origins:
    - https://nexus-crm.com
  allow_credentials: true
  methods:
    - GET
    - POST
    - OPTIONS

health_check:
  listen: 0.0.0.0:8088
  enabled: true

authentication:
  jwt:
    jwks:
      - url: "http://keycloak:8080/realms/nexus/protocol/openid-connect/certs"

rate_limit:
  capacity: 1000
  interval: 60s

subgraphs:
  auth:
    routing_url: http://auth-service:3010/graphql
    schema:
      subgraph_url: http://auth-service:3010/graphql
  # The services below are REST-only. They do not expose GraphQL endpoints.
  # Uncomment and configure routing_url / subgraph_url only after a GraphQL
  # server is deployed in the respective service.
