apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbackrest-config
  namespace: nexus
data:
  pgbackrest.conf: |
    [global]
    repo1-type=s3
    repo1-s3-region=us-east-1
    repo1-s3-bucket=nexus-crm-backups
    repo1-path=/pgbackrest
    repo1-retention-full=30
    repo1-retention-diff=7
    start-fast=y
    stop-auto=y
    log-level-console=info
    process-max=4

    [nexus]
    pg1-path=/var/lib/postgresql/data
    pg1-port=5432
    pg1-database=nexus
