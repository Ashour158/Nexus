apiVersion: apps/v1
kind: Deployment
metadata:
  name: reporting-service
  namespace: nexus
  labels:
    app.kubernetes.io/name: nexus-reporting-service
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: nexus-reporting-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nexus-reporting-service
        app.kubernetes.io/component: backend
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
      - name: reporting-service
        image: ghcr.io/nexus-crm/nexus-reporting-service:latest
        ports:
        - containerPort: 3021
          name: http
        env:
        - name: PORT
          value: "3021"
        - name: SERVICE_DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: nexus-secrets
              key: reporting-service-database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: nexus-secrets
              key: redis-url
        - name: KAFKA_BROKERS
          valueFrom:
            configMapKeyRef:
              name: nexus-config
              key: KAFKA_BROKERS
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3021
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 3021
          initialDelaySeconds: 5
          periodSeconds: 5
        securityContext:
          readOnlyRootFilesystem: false
          allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: reporting-service
  namespace: nexus
  labels:
    app.kubernetes.io/name: nexus-reporting-service
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: nexus-reporting-service
  ports:
  - name: http
    port: 3021
    targetPort: 3021
