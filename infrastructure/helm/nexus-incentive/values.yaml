global:
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: ""

replicaCount: 2

image:
  repository: ghcr.io/nexus-crm/nexus-incentive
  pullPolicy: IfNotPresent
  tag: "v1.0.0"

service:
  type: ClusterIP
  port: 80

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 1

env:
  INCENTIVE_DATABASE_URL: "postgresql://nexus_app@nexus-pgbouncer:6432/nexus_incentive"
  PORT: "3024"
