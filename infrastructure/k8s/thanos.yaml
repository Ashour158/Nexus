apiVersion: v1
kind: ConfigMap
metadata:
  name: thanos-query
  namespace: nexus-monitoring
data:
  thanos-query.yaml: |
    query:
      replicas: 2
      stores:
        - prometheus:9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: thanos-query
  namespace: nexus-monitoring
spec:
  replicas: 2
  selector:
    matchLabels:
      app: thanos-query
  template:
    metadata:
      labels:
        app: thanos-query
    spec:
      containers:
        - name: query
          image: quay.io/thanos/thanos:v0.35.0
          args:
            - query
            - --http-address=0.0.0.0:9090
            - --store=prometheus:9090
          ports:
            - containerPort: 9090
              name: http
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: thanos-query
  namespace: nexus-monitoring
spec:
  selector:
    app: thanos-query
  ports:
    - port: 9090
      targetPort: 9090
