_format_version: "3.0"

# Production TLS: Replace env vars with real certificates (Let's Encrypt / ACM / cert-manager).
# Internal service-to-service traffic remains HTTP; only the gateway edge terminates TLS.
certificates:
  - id: nexus-api-cert
    cert: "${TLS_CERT:-}"
    key: "${TLS_KEY:-}"
    snis:
      - name: "${TLS_SNI:-localhost}"

plugins:
  - name: pre-function
    config:
      access:
        - |
          if kong.request.get_scheme() == "http" then
            return kong.response.exit(301, nil, { ["Location"] = "https://" .. kong.request.get_host() .. ":8443" .. kong.request.get_path() })
          end
  - name: rate-limiting
    config:
      minute: 100
      policy: redis
      redis_host: redis

  - name: jwt
    config:
      uri_param_names: []
      cookie_names: []
      key_claim_name: iss
      secret_is_base64: false
      claims_to_verify:
        - exp

