extend schema
  @link(url: "https://specs.apollo.dev/federation/v2.0", import: ["@key", "@shareable", "@external"])

type Query {
  accounts(limit: Int, offset: Int): [Account!]!
  account(id: ID!): Account
  accountHealthScores(limit: Int, offset: Int): [AccountHealthScore!]!
  accountHealthScore(id: ID!): AccountHealthScore
}

type Mutation {
  createAccount(input: CreateAccountInput!): Account!
  updateAccount(id: ID!, input: UpdateAccountInput!): Account!
  deleteAccount(id: ID!): Boolean!
  createAccountHealthScore(input: CreateAccountHealthScoreInput!): AccountHealthScore!
  updateAccountHealthScore(id: ID!, input: UpdateAccountHealthScoreInput!): AccountHealthScore!
  deleteAccountHealthScore(id: ID!): Boolean!
}

type Account @key(fields: "id") {
  id: ID!
  tenantId: ID!
  ownerId: ID!
  parentAccountId: ID
  name: String!
  website: String
  phone: String
  email: String
  industry: String
  type: String!
  tier: String!
  status: String!
  annualRevenue: Float
  employeeCount: Int
  country: String
  city: String
  address: String
  zipCode: String
  linkedInUrl: String
  description: String
  sicCode: String
  naicsCode: String
  healthScore: Int
  npsScore: Int
  customFields: JSON
  lat: Float
  lng: Float
  tags: [String!]!
  dataQualityScore: Int
  deletedAt: DateTime
  createdAt: DateTime!
  updatedAt: DateTime!
  healthRecord: AccountHealthScore
}

type AccountHealthScore @key(fields: "id") {
  id: ID!
  tenantId: ID!
  accountId: ID!
  score: Int!
  riskLevel: String!
  churnProbability: Float!
  signals: JSON
  lastActivityDays: Int
  openDealsCount: Int!
  wonDealsCount: Int!
  lostDealsCount: Int!
  scoredAt: DateTime!
  createdAt: DateTime!
  updatedAt: DateTime!
}

input CreateAccountInput {
  tenantId: ID!
  ownerId: ID!
  parentAccountId: ID
  name: String!
  website: String
  phone: String
  email: String
  industry: String
  type: String
  tier: String
  status: String
  annualRevenue: Float
  employeeCount: Int
  country: String
  city: String
  address: String
  zipCode: String
  linkedInUrl: String
  description: String
  sicCode: String
  naicsCode: String
  customFields: JSON
  lat: Float
  lng: Float
  tags: [String!]
}

input UpdateAccountInput {
  ownerId: ID
  parentAccountId: ID
  name: String
  website: String
  phone: String
  email: String
  industry: String
  type: String
  tier: String
  status: String
  annualRevenue: Float
  employeeCount: Int
  country: String
  city: String
  address: String
  zipCode: String
  linkedInUrl: String
  description: String
  sicCode: String
  naicsCode: String
  healthScore: Int
  npsScore: Int
  customFields: JSON
  lat: Float
  lng: Float
  tags: [String!]
  dataQualityScore: Int
}

input CreateAccountHealthScoreInput {
  tenantId: ID!
  accountId: ID!
  score: Int
  riskLevel: String
  churnProbability: Float
  signals: JSON
  lastActivityDays: Int
  openDealsCount: Int
  wonDealsCount: Int
  lostDealsCount: Int
}

input UpdateAccountHealthScoreInput {
  score: Int
  riskLevel: String
  churnProbability: Float
  signals: JSON
  lastActivityDays: Int
  openDealsCount: Int
  wonDealsCount: Int
  lostDealsCount: Int
}

scalar DateTime
scalar JSON
