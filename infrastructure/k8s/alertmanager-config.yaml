apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: nexus-monitoring
data:
  alertmanager.yml: |
    global:
      smtp_smarthost: 'smtp.gmail.com:587'
      smtp_from: 'alerts@nexus-crm.io'
    route:
      group_by: ['alertname']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 1h
      receiver: 'slack'
    receivers:
      - name: 'slack'
        slack_configs:
          - api_url: '${SLACK_WEBHOOK_URL}'
            channel: '#nexus-alerts'
            title: 'Nexus CRM Alert'
            text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['alertname', 'dev', 'instance']
