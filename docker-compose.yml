services:
  # ─── Infrastructure ─────────────────────────────────────────────────────────
  postgres:
    # NOTE: Backend services should connect via PgBouncer (pgbouncer:6432) instead of directly
    image: postgres:16-alpine
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexus}
      POSTGRES_DB: nexus
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nexus -d nexus']
      interval: 5s
      timeout: 5s
      retries: 10

  # PgBouncer connection pooler — all backend services should connect via port 6432
  pgbouncer:
    build: ./infrastructure/postgres/pgbouncer
    container_name: nexus-pgbouncer
    restart: unless-stopped
    ports:
      - '6432:6432'
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://nexus:${POSTGRES_PASSWORD:-nexus}@postgres:5432/nexus

  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    command: ['redis-server', '--requirepass', '${REDIS_PASSWORD:-nexus}']
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-nexus}', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: nexus-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    healthcheck:
      test: ['CMD-SHELL', 'echo ruok | nc localhost 2181 || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: nexus-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - '9092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT_INTERNAL'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ['CMD-SHELL', 'kafka-topics --bootstrap-server localhost:9092 --list || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  meilisearch:
    image: getmeili/meilisearch:v1.8
    container_name: nexus-meilisearch
    restart: unless-stopped
    ports:
      - '7700:7700'
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-nexus-dev}
      MEILI_ENV: development
    volumes:
      - meilisearch_data:/meili_data

  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-56Z
    container_name: nexus-minio
    restart: unless-stopped
    command: ['server', '/data', '--console-address', ':9001']
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-nexus}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-nexus-minio}
    volumes:
      - minio_data:/data

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: nexus-keycloak
    restart: unless-stopped
    command: ['start-dev']
    ports:
      - '8080:8080'
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://pgbouncer:6432/nexus
      KC_DB_USERNAME: nexus
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-nexus}
    depends_on:
      postgres:
        condition: service_healthy

  kong:
    image: kong:3.7
    container_name: nexus-kong
    restart: unless-stopped
    ports:
      - '8000:8000'  # Proxy port
      - '8443:8443'  # SSL proxy port
      - '8001:8001'  # Admin API port
      - '8444:8444'  # SSL admin API port
    environment:
      KONG_DATABASE: 'off'
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001, 0.0.0.0:8444 ssl
      KONG_PLUGINS: bundled,cors,rate-limiting,request-transformer,key-auth,jwt,oauth2
    volumes:
      - ./infrastructure/kong/kong.yml:/kong/declarative/kong.yml:ro
    depends_on:
      - auth-service
      - crm-service
      - finance-service

  # ─── App Services ───────────────────────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: ./services/auth-service/Dockerfile
    container_name: nexus-auth
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      PORT: '3000'
      APP_URL: http://localhost:3000
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgresql://nexus:${POSTGRES_PASSWORD:-nexus}@pgbouncer:6432/nexus_auth
      KAFKA_BROKERS: kafka:29092
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started

  crm-service:
