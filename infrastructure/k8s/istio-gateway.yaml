apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: nexus-gateway
  namespace: nexus
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "*"
      tls:
        httpsRedirect: true
    - port:
        number: 443
        name: https
        protocol: HTTPS
      tls:
        mode: SIMPLE
        credentialName: nexus-crm-tls
      hosts:
        - "*.nexus-crm.io"
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: nexus-routes
  namespace: nexus
spec:
  hosts:
    - "app.nexus-crm.io"
    - "api.nexus-crm.io"
  gateways:
    - nexus-gateway
  http:
    - match:
        - uri:
            prefix: /graphql
      route:
        - destination:
            host: graphql-gateway
            port:
              number: 4000
    - match:
        - uri:
            prefix: /
      route:
        - destination:
            host: web
            port:
              number: 3000
