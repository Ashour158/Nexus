# Nexus production-readiness alerts.
# Loaded by prometheus.yml from /etc/prometheus/rules/*.yml.
#
# IMPORTANT: packages/service-utils declares nexus_http_requests_total and
# nexus_http_request_duration_seconds, but the repository currently never calls
# inc()/observe() for either collector. Labelled collectors emit no time series
# until observed, so 5xx-rate and request-latency alerts would be permanently
# blind. Do not add false-confidence rules for those signals until request hooks
# populate them. HttpRequestTelemetryMissing keeps that gap visible meanwhile.
groups:
  - name: nexus-availability
    rules:
      - alert: NexusServiceTargetDown
        expr: up{job="nexus-services"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: 'Nexus target {{ $labels.instance }} is down'
          description: 'Prometheus has failed to scrape {{ $labels.instance }} for more than 2 minutes.'

      - alert: NexusServiceRestarting
        expr: changes(nexus_process_start_time_seconds{job="nexus-services"}[15m]) > 2
        labels:
          severity: warning
        annotations:
          summary: 'Nexus target {{ $labels.instance }} is restarting'
          description: '{{ $labels.instance }} restarted more than twice in 15 minutes.'

  - name: nexus-telemetry-readiness
    rules:
      # This intentionally fires for healthy scrape targets that expose no
      # samples for the registered request counter. Once HTTP instrumentation is
      # wired, replace this gap alert with the requested 5xx and p95 rules.
      - alert: NexusHttpRequestTelemetryMissing
        expr: |
          (up{job="nexus-services"} == 1)
            unless on (job, instance)
          count by (job, instance) (nexus_http_requests_total{job="nexus-services"})
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 'HTTP request telemetry missing for {{ $labels.instance }}'
          description: '{{ $labels.instance }} is scrapeable but emits no nexus_http_requests_total samples; 5xx-rate and request-latency alerting is unavailable.'

  - name: nexus-runtime
    rules:
      # Real prom-client default metrics, all prefixed by collectDefaultMetrics.
      - alert: NexusHighProcessCpu
        expr: rate(nexus_process_cpu_seconds_total{job="nexus-services"}[5m]) > 0.8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 'High process CPU on {{ $labels.instance }}'
          description: '{{ $labels.instance }} has consumed more than 0.8 CPU-seconds per second for 10 minutes.'

      - alert: NexusEventLoopLag
        expr: nexus_nodejs_eventloop_lag_p99_seconds{job="nexus-services"} > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 'Event-loop lag on {{ $labels.instance }}'
          description: 'p99 Node.js event-loop lag on {{ $labels.instance }} has exceeded 500ms for 10 minutes.'
