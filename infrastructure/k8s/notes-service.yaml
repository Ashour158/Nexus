apiVersion: apps/v1
kind: Deployment
metadata:
  name: notes-service
  namespace: nexus
  labels:
    app: notes-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notes-service
  template:
    metadata:
      labels:
        app: notes-service
    spec:
      containers:
      - name: notes-service
        image: nexus/notes-service:latest
        ports:
        - containerPort: 3032
          name: http
        env:
        - name: PORT
          value: "3032"
        - name: NOTES_DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: nexus-secrets
              key: notes-database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: nexus-redis
              key: url
        - name: KAFKA_BROKERS
          valueFrom:
            configMapKeyRef:
              name: nexus-config
              key: KAFKA_BROKERS
        resources:
          requests:
            memory: "256Mi"
            cpu: "125m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3032
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3032
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: notes-service
  namespace: nexus
spec:
  selector:
    app: notes-service
  ports:
  - port: 3032
    targetPort: 3032
