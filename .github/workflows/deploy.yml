name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options: [production, staging]
      image_tag:
        description: 'Docker image tag to deploy (default: latest)'
        required: false
        default: 'latest'
        type: string
      skip_migrations:
        description: 'Skip database migrations'
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ github.event.inputs.environment || 'production' }}
    concurrency:
      group: deploy-${{ github.event.inputs.environment || 'production' }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Create deployment
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: '${{ github.event.inputs.environment || "production" }}',
              auto_merge: false,
              required_contexts: [],
            });
            return deployment.data.id;

      - name: Deploy via SSH
        id: ssh_deploy
        uses: appleboy/ssh-action@v1
        env:
          DEPLOY_IMAGE_TAG: ${{ github.event.inputs.image_tag || github.sha }}
          DEPLOY_SKIP_MIGRATIONS: ${{ github.event.inputs.skip_migrations }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: DEPLOY_IMAGE_TAG,DEPLOY_SKIP_MIGRATIONS
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/nexus
            export IMAGE_TAG="$DEPLOY_IMAGE_TAG"
            case "$IMAGE_TAG" in *[!A-Za-z0-9._-]*) echo "invalid image tag"; exit 1;; esac
            echo "Pulling images with tag: ${IMAGE_TAG}"
            docker compose pull || true

            if [ "$DEPLOY_SKIP_MIGRATIONS" = "false" ]; then
              echo "Running migrations..."
              bash scripts/migrate-all.sh
            else
              echo "Skipping migrations (user request)"
            fi

            echo "Starting services..."
            docker compose up -d --remove-orphans --wait

            echo "Cleaning up old images..."
            docker system prune -f --filter "until=24h" || true

      - name: Smoke test
        id: smoke_test
        uses: appleboy/ssh-action@v1
        if: always() && steps.ssh_deploy.outcome == 'success'
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            echo "Running smoke tests..."
            cd /opt/nexus
            bash scripts/health-check.sh || {
              echo "❌ Smoke tests failed — initiating rollback..."
              docker compose down
              docker compose up -d --wait
              bash scripts/health-check.sh || exit 1
              echo "✅ Rollback complete"
              exit 1
            }
            echo "✅ Smoke tests passed"

      - name: Update deployment status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const state = '${{ job.status }}' === 'success' ? 'success' : 'failure';
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.result }},
              state: state,
              environment_url: '${{ secrets.APP_URL }}',
            });

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            core.setFailed('Deployment failed. Check the deployment logs and run rollback if needed: ./scripts/rollback.sh <service>');
