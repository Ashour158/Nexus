# Nexus Workflow Add Or Modify Database Table Or Schema

## Action

Follow the add-or-modify-database-table-or-schema workflow:
1. Edit the relevant Prisma schema file (e.g., add model, field, or constraint).
2. If soft-delete: add deletedAt column to schema.
3. Update or create migration SQL file if needed.
4. Update service code to use new/changed fields (e.g., filter deletedAt, enforce tenantId).
5. Update or create service logic to handle new constraints or fields.
6. Update .env.example if new env vars are needed for encryption.
7. Test new/changed model logic.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~3x per month
- Files: services/*/prisma/schema.prisma, services/*/prisma/migrations/*/migration.sql, services/*/src/services/*.ts

