[databases]
nexus = host=postgres port=5432 dbname=nexus

[pgbouncer]
listen_port = 6432
listen_addr = 0.0.0.0
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
; Prisma requires prepared statements to be disabled when using PgBouncer.
; The client-side half of this is each service's DATABASE_URL adding
; ?pgbouncer=true (or prepare_threshold=0) when connecting through pgbouncer:6432.
; The real server-side directive is max_prepared_statements (there is no
; "prepare_threshold" or "disallow_prepared_statements" in pgbouncer.ini —
; both were rejected as unknown parameters and pgbouncer refused to start).
max_prepared_statements = 0
max_client_conn = 10000
default_pool_size = 25
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3
max_db_connections = 100
max_user_connections = 100
server_idle_timeout = 600
server_lifetime = 3600
server_connect_timeout = 15
client_idle_timeout = 0
client_login_timeout = 60
query_timeout = 0
query_wait_timeout = 120
