_format_version: "3.0"

# NOTE: Kong's declarative loader does NOT expand shell-style ${VAR} placeholders.
# The previous config embedded ${TLS_CERT}/${TLS_SNI}/${JWT_PUBLIC_KEY} literally,
# which Kong tried to parse as a real PEM / SNI / RSA key and rejected at boot
# (crash-looped indefinitely). TLS termination and edge JWT are handled outside
# Kong in this deployment (the browser talks to the Next.js BFF; every upstream
# service independently verifies its own RS256 JWT via JWKS), so the gateway here
# is a plain HTTP router with global rate-limiting + CORS.
#
# To add real edge TLS in production: mount actual cert/key files and add a
# `certificates:` entry with their literal contents (or use decK/Vault refs).
# To add edge JWT: use an OIDC/JWKS-capable plugin (Kong's OSS `jwt` plugin needs
# a static RSA key and can't follow JWKS key rotation).

plugins:
  - name: rate-limiting
    config:
      minute: 100
      policy: local
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Authorization
        - Content-Type
        - x-tenant-id
      credentials: false
      max_age: 3600

services:
  - name: graphql-gateway
    url: http://graphql-gateway:4000
    routes:
      - name: graphql
        paths:
          - /graphql
        strip_path: false

  - name: auth-service
    url: http://auth-service:3000
    routes:
