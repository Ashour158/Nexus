    environment:
      PORT: '3028'
      AUDIT_DATABASE_URL: postgresql://nexus:${POSTGRES_PASSWORD:-nexus}@pgbouncer:6432/nexus_audit
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: audit-consumer
    depends_on:
