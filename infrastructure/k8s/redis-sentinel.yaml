# =============================================================================
# Redis High Availability with Sentinel
# Replaces single-replica StatefulSet to eliminate SPOF
# =============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-master
  namespace: nexus
spec:
  serviceName: redis-master
  replicas: 1
  selector:
    matchLabels:
      app: redis-master
  template:
    metadata:
      labels:
        app: redis-master
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine
          ports:
            - containerPort: 6379
              name: redis
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --maxmemory
            - "768mb"
            - --maxmemory-policy
            - "allkeys-lru"
            - --tcp-keepalive
            - "60"
            - --timeout
            - "300"
            - --tcp-backlog
            - "511"
            - --protected-mode
            - "no"
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            limits:
              cpu: 2000m
              memory: 2Gi
            requests:
              cpu: 500m
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 50Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-replica
  namespace: nexus
spec:
  serviceName: redis-replica
  replicas: 2
  selector:
    matchLabels:
      app: redis-replica
  template:
    metadata:
      labels:
        app: redis-replica
    spec:
      initContainers:
        - name: wait-for-master
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis-master 6379; do
                echo "Waiting for redis-master..."
                sleep 2
              done
      containers:
        - name: redis
          image: redis:7.2-alpine
          ports:
            - containerPort: 6379
              name: redis
          command:
            - redis-server
            - --replicaof
            - redis-master.nexus.svc.cluster.local
            - "6379"
            - --appendonly
            - "yes"
            - --maxmemory
            - "768mb"
            - --maxmemory-policy
            - "allkeys-lru"
            - --tcp-keepalive
            - "60"
            - --timeout
            - "300"
            - --tcp-backlog
            - "511"
            - --protected-mode
            - "no"
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            limits:
              cpu: 2000m
              memory: 2Gi
            requests:
              cpu: 500m
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-sentinel
  namespace: nexus
  labels:
    app: redis-sentinel
spec:
  replicas: 3
  selector:
    matchLabels:
      app: redis-sentinel
  template:
    metadata:
      labels:
        app: redis-sentinel
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - redis-sentinel
                topologyKey: kubernetes.io/hostname
      initContainers:
        - name: wait-for-master
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis-master 6379; do
                echo "Waiting for redis-master..."
                sleep 2
              done
      containers:
        - name: sentinel
          image: redis:7.2-alpine
          ports:
            - containerPort: 26379
              name: sentinel
          command:
            - sh
            - -c
            - |
              mkdir -p /etc/redis
              cat <<EOF > /etc/redis/sentinel.conf
              sentinel monitor mymaster redis-master.nexus.svc.cluster.local 6379 2
              sentinel down-after-milliseconds mymaster 5000
              sentinel parallel-syncs mymaster 1
              sentinel failover-timeout mymaster 10000
              sentinel resolve-hostnames yes
              bind 0.0.0.0
              protected-mode no
              EOF
              redis-sentinel /etc/redis/sentinel.conf
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            tcpSocket:
              port: 26379
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 26379
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis-master
  namespace: nexus
spec:
  selector:
    app: redis-master
  ports:
    - port: 6379
      targetPort: 6379
  clusterIP: None
---
apiVersion: v1
kind: Service
metadata:
  name: redis-replica
  namespace: nexus
spec:
  selector:
    app: redis-replica
  ports:
    - port: 6379
      targetPort: 6379
  clusterIP: None
---
apiVersion: v1
kind: Service
metadata:
  name: redis-sentinel
  namespace: nexus
spec:
  selector:
    app: redis-sentinel
  ports:
    - port: 26379
      targetPort: 26379
  clusterIP: None
---
# Update the main Redis service to point to Sentinel-aware clients
# Clients should connect via redis-sentinel service and use "mymaster" as master name
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: nexus
  annotations:
    description: "Redis Sentinel service. Clients should discover master via sentinel nodes on port 26379"
spec:
  selector:
    app: redis-master
  ports:
    - port: 6379
      targetPort: 6379
  # Note: During failover this will briefly point to the old master.
  # For true HA, clients must use Sentinel discovery (ioredis sentinel mode).
