<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#4f46e5" />
    <title>Offline — Nexus CRM</title>
    <style>
      * { box-sizing: border-box; }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #f7f8fc;
        color: #1b1b24;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(100%, 430px);
        padding: 40px 32px;
        border: 1px solid #cfd0e0;
        border-radius: 24px;
        background: #fff;
        box-shadow: 0 18px 50px rgb(31 41 55 / 10%);
        text-align: center;
      }
      .mark {
        display: grid;
        width: 72px;
        height: 72px;
        margin: 0 auto 24px;
        place-items: center;
        border-radius: 20px;
        background: #4f46e5;
        color: #fff;
        font-size: 34px;
        font-weight: 800;
      }
      h1 { margin: 0 0 12px; font-size: 1.75rem; }
      p { margin: 0 0 28px; color: #45455a; line-height: 1.6; }
      button {
        min-height: 44px;
        padding: 0 22px;
        border: 0;
        border-radius: 12px;
        background: #4f46e5;
        color: #fff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }
      button:focus-visible { outline: 3px solid #c7d2fe; outline-offset: 3px; }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">N</div>
      <h1>You’re offline</h1>
      <p>Nexus CRM needs a network connection to load customer data securely. Reconnect, then try again.</p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
