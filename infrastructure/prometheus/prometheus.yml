global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Route firing alerts to Alertmanager (service name/port match docker-compose.prod.yml).
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# Load recording/alerting rules. Mounted at /etc/prometheus/rules (see docker-compose.yml).
rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'nexus-services'
    static_configs:
      - targets:
          - 'auth-service:3000'
          - 'crm-service:3001'
          - 'finance-service:3002'
          - 'notification-service:3003'
          - 'metadata-service:3004'
          - 'realtime-service:3005'
          - 'search-service:3006'
          - 'workflow-service:3007'
          - 'analytics-service:3008'
          - 'comm-service:3009'
          - 'storage-service:3010'
          - 'integration-service:3012'
          - 'blueprint-service:3013'
          - 'approval-service:3014'
          - 'data-service:3015'
          - 'document-service:3016'
          - 'chatbot-service:3017'
          - 'cadence-service:3018'
          - 'territory-service:3019'
          - 'planning-service:3020'
          - 'reporting-service:3021'
          - 'portal-service:3022'
          - 'knowledge-service:3023'
          - 'incentive-service:3024'
          - 'email-sync-service:3026'
          - 'contacts-service:3041'
          - 'deals-service:3042'
          - 'activities-service:3043'
          - 'leads-service:3030'
          - 'accounts-service:3031'
          - 'notes-service:3032'
          - 'quotes-service:3033'
          - 'graphql-gateway:4000'
    metrics_path: /metrics
