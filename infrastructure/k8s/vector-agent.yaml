apiVersion: v1
kind: ConfigMap
metadata:
  name: vector-config
  namespace: nexus-monitoring
data:
  vector.toml: |
    [sources.kubernetes_logs]
    type = "kubernetes_logs"

    [transforms.parse_logs]
    type = "remap"
    inputs = ["kubernetes_logs"]
    source = '''
    . = parse_json!(.message)
    '''

    [sinks.loki]
    type = "loki"
    inputs = ["parse_logs"]
    endpoint = "http://loki:3100"
    encoding.codec = "json"
    labels.job = "vector"
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: vector
  namespace: nexus-monitoring
spec:
  selector:
    matchLabels:
      app: vector
  template:
    metadata:
      labels:
        app: vector
    spec:
      serviceAccountName: nexus-crm
      containers:
        - name: vector
          image: timberio/vector:0.38.0-distroless-libc
          args:
            - --config
            - /etc/vector/vector.toml
          volumeMounts:
            - name: config
              mountPath: /etc/vector
            - name: varlog
              mountPath: /var/log
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: config
          configMap:
            name: vector-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
