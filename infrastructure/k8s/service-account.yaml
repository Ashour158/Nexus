apiVersion: v1
kind: ServiceAccount
metadata:
  name: nexus-crm
  namespace: nexus
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/nexus-crm-pod-role
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nexus-crm-role
  namespace: nexus
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nexus-crm-role-binding
  namespace: nexus
subjects:
  - kind: ServiceAccount
    name: nexus-crm
    namespace: nexus
roleRef:
  kind: Role
  name: nexus-crm-role
  apiGroup: rbac.authorization.k8s.io
