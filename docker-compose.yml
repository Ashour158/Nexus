      KAFKA_BROKERS: kafka:29092
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  metadata-service:
    build:
      context: .
      dockerfile: ./services/metadata-service/Dockerfile
    container_name: nexus-metadata
    restart: unless-stopped
    ports:
