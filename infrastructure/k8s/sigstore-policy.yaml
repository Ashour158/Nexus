apiVersion: policy.sigstore.dev/v1beta1
kind: ClusterImagePolicy
metadata:
  name: require-nexus-signature
spec:
  images:
    - glob: "nexus-crm/**"
  authorities:
    - keyless:
        url: https://fulcio.sigstore.dev
        identities:
          - issuer: https://token.actions.githubusercontent.com
            subject: https://github.com/nexus-crm/nexus-crm/.github/workflows/build.yml@refs/heads/main
      ctlog:
        url: https://rekor.sigstore.dev
