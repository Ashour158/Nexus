apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: nexus-crm
  namespace: nexus
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`app.nexus-crm.io`)
      kind: Rule
      services:
        - name: web
          port: 3000
    - match: Host(`api.nexus-crm.io`) && PathPrefix(`/graphql`)
      kind: Rule
      services:
        - name: graphql-gateway
          port: 4000
    - match: Host(`api.nexus-crm.io`)
      kind: Rule
      services:
        - name: nexus-crm
          port: 3000
      middlewares:
        - name: rate-limit
  tls:
    certResolver: letsencrypt
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rate-limit
  namespace: nexus
spec:
  rateLimit:
    average: 100
    burst: 50
