# Nexus production-readiness alerts.
# Loaded by prometheus.yml from /etc/prometheus/rules/*.yml.
#
# nexus_http_requests_total / nexus_http_request_duration_seconds are populated
# by the shared `onResponse` hook in packages/service-utils (createService),
# labelled by method / route pattern / status_code / service. Infra probes
# (/health, /ready, /metrics, /version) are excluded at the source, so rate
# denominators below reflect real traffic only.
groups:
  - name: nexus-availability
    rules:
      - alert: NexusServiceTargetDown
        expr: up{job="nexus-services"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: 'Nexus target {{ $labels.instance }} is down'
          description: 'Prometheus has failed to scrape {{ $labels.instance }} for more than 2 minutes.'

      - alert: NexusServiceRestarting
        expr: changes(nexus_process_start_time_seconds{job="nexus-services"}[15m]) > 2
        labels:
          severity: warning
        annotations:
          summary: 'Nexus target {{ $labels.instance }} is restarting'
          description: '{{ $labels.instance }} restarted more than twice in 15 minutes.'

  - name: nexus-http
    rules:
      # Sustained 5xx error rate. The ratio is NaN when a service has no
      # traffic in the window, and NaN never satisfies `>`, so idle services
      # cannot fire. Warning at 5%, critical at 20%.
      - alert: NexusHttp5xxRateHigh
        expr: |
          sum by (service) (rate(nexus_http_requests_total{job="nexus-services",status_code=~"5.."}[5m]))
            /
          sum by (service) (rate(nexus_http_requests_total{job="nexus-services"}[5m]))
            > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'High 5xx rate on {{ $labels.service }}'
          description: '{{ $labels.service }} has served more than 5% 5xx responses for 5 minutes ({{ $value | humanizePercentage }}).'

      - alert: NexusHttp5xxRateCritical
        expr: |
          sum by (service) (rate(nexus_http_requests_total{job="nexus-services",status_code=~"5.."}[5m]))
            /
          sum by (service) (rate(nexus_http_requests_total{job="nexus-services"}[5m]))
            > 0.20
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: 'Critical 5xx rate on {{ $labels.service }}'
          description: '{{ $labels.service }} has served more than 20% 5xx responses for 5 minutes ({{ $value | humanizePercentage }}).'

      # p95 request latency from the shared duration histogram. Idle services
      # yield NaN (empty rate) and cannot fire.
      - alert: NexusHttpP95LatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le, service) (rate(nexus_http_request_duration_seconds_bucket{job="nexus-services"}[5m]))
          ) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 'High p95 latency on {{ $labels.service }}'
          description: 'p95 request latency for {{ $labels.service }} has exceeded 1s for 10 minutes ({{ $value }}s).'

      - alert: NexusHttpP95LatencyCritical
        expr: |
          histogram_quantile(
            0.95,
            sum by (le, service) (rate(nexus_http_request_duration_seconds_bucket{job="nexus-services"}[5m]))
          ) > 2.5
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: 'Critical p95 latency on {{ $labels.service }}'
          description: 'p95 request latency for {{ $labels.service }} has exceeded 2.5s for 10 minutes ({{ $value }}s).'

  - name: nexus-runtime
    rules:
      # Real prom-client default metrics, all prefixed by collectDefaultMetrics.
      - alert: NexusHighProcessCpu
        expr: rate(nexus_process_cpu_seconds_total{job="nexus-services"}[5m]) > 0.8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 'High process CPU on {{ $labels.instance }}'
          description: '{{ $labels.instance }} has consumed more than 0.8 CPU-seconds per second for 10 minutes.'

      - alert: NexusEventLoopLag
        expr: nexus_nodejs_eventloop_lag_p99_seconds{job="nexus-services"} > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 'Event-loop lag on {{ $labels.instance }}'
          description: 'p99 Node.js event-loop lag on {{ $labels.instance }} has exceeded 500ms for 10 minutes.'
