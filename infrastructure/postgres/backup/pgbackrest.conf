[global]
repo1-type=s3
repo1-s3-region=us-east-1
repo1-s3-bucket=nexus-crm-backups
# AWS credentials should be injected via environment variables or IAM role.
# Do NOT commit real credentials to version control.
# Set PGBACKREST_REPO1_S3_KEY and PGBACKREST_REPO1_S3_KEY_SECRET env vars,
# or use an EC2 instance profile / IAM role for S3 access.
repo1-path=/pgbackrest
repo1-retention-full=30
repo1-retention-diff=7
start-fast=y
stop-auto=y
log-level-console=info
log-level-file=detail
process-max=4

[nexus]
pg1-path=/var/lib/postgresql/data
pg1-port=5432
pg1-database=nexus

[global:archive-push]
compress-level=6

[global:backup]
repo1-bundle=y
repo1-block=y
