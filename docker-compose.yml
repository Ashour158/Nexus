  incentive-service:
    build:
      context: .
      dockerfile: ./services/incentive-service/Dockerfile
    container_name: nexus-incentive
    restart: unless-stopped
    ports:
      - '3024:3024'
    environment:
      PORT: '3024'
      DATABASE_URL: postgresql://nexus:${POSTGRES_PASSWORD:-nexus}@pgbouncer:6432/nexus_incentive
      KAFKA_BROKERS: kafka:29092
