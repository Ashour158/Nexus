extend schema
  @link(url: "https://specs.apollo.dev/federation/v2.0", import: ["@key", "@shareable", "@external"])

type Query {
  products(limit: Int, offset: Int): [Product!]!
  product(id: ID!): Product
  priceTiers(productId: ID, limit: Int, offset: Int): [PriceTier!]!
  priceTier(id: ID!): PriceTier
  promoCodes(limit: Int, offset: Int): [PromoCode!]!
  promoCode(id: ID!): PromoCode
  accounts(limit: Int, offset: Int): [Account!]! @shareable
  account(id: ID!): Account @shareable
  quotes(limit: Int, offset: Int): [Quote!]!
  quote(id: ID!): Quote
  invoices(limit: Int, offset: Int): [Invoice!]!
  invoice(id: ID!): Invoice
  contracts(limit: Int, offset: Int): [Contract!]!
  contract(id: ID!): Contract
  subscriptions(limit: Int, offset: Int): [Subscription!]!
  subscription(id: ID!): Subscription
  payments(limit: Int, offset: Int): [Payment!]!
  payment(id: ID!): Payment
  currencies(limit: Int, offset: Int): [Currency!]!
  currency(id: ID!): Currency
  taxZones(limit: Int, offset: Int): [TaxZone!]!
  taxZone(id: ID!): TaxZone
  taxRates(limit: Int, offset: Int): [TaxRate!]!
  taxRate(id: ID!): TaxRate
}

type Mutation {
  createProduct(input: CreateProductInput!): Product!
  updateProduct(id: ID!, input: UpdateProductInput!): Product!
  deleteProduct(id: ID!): Boolean!
  createPriceTier(input: CreatePriceTierInput!): PriceTier!
  updatePriceTier(id: ID!, input: UpdatePriceTierInput!): PriceTier!
  deletePriceTier(id: ID!): Boolean!
  createPromoCode(input: CreatePromoCodeInput!): PromoCode!
  updatePromoCode(id: ID!, input: UpdatePromoCodeInput!): PromoCode!
  deletePromoCode(id: ID!): Boolean!
  createQuote(input: CreateQuoteInput!): Quote! @deprecated(reason: "CPQ mutations moved to finance-service transition authority.")
  updateQuote(id: ID!, input: UpdateQuoteInput!): Quote! @deprecated(reason: "CPQ mutations moved to finance-service transition authority.")
  deleteQuote(id: ID!): Boolean! @deprecated(reason: "CPQ mutations moved to finance-service transition authority.")
  createInvoice(input: CreateInvoiceInput!): Invoice!
  updateInvoice(id: ID!, input: UpdateInvoiceInput!): Invoice!
  deleteInvoice(id: ID!): Boolean!
  createContract(input: CreateContractInput!): Contract!
  updateContract(id: ID!, input: UpdateContractInput!): Contract!
  deleteContract(id: ID!): Boolean!
  createSubscription(input: CreateSubscriptionInput!): Subscription!
  updateSubscription(id: ID!, input: UpdateSubscriptionInput!): Subscription!
  deleteSubscription(id: ID!): Boolean!
  createPayment(input: CreatePaymentInput!): Payment!
  updatePayment(id: ID!, input: UpdatePaymentInput!): Payment!
  deletePayment(id: ID!): Boolean!
  createCurrency(input: CreateCurrencyInput!): Currency!
  updateCurrency(id: ID!, input: UpdateCurrencyInput!): Currency!
  deleteCurrency(id: ID!): Boolean!
  createTaxZone(input: CreateTaxZoneInput!): TaxZone!
  updateTaxZone(id: ID!, input: UpdateTaxZoneInput!): TaxZone!
  deleteTaxZone(id: ID!): Boolean!
  createTaxRate(input: CreateTaxRateInput!): TaxRate!
  updateTaxRate(id: ID!, input: UpdateTaxRateInput!): TaxRate!
  deleteTaxRate(id: ID!): Boolean!
}

type Product @key(fields: "id") {
  id: ID!
  tenantId: ID!
  sku: String!
  name: String!
  nameAr: String
  description: String
  descriptionAr: String
  unitAr: String
  type: String!
  category: String
  currency: String!
  listPrice: Float!
  cost: Float
  billingType: String!
  billingPeriod: String
  taxable: Boolean!
  taxCode: String
  isActive: Boolean!
  pricingRules: JSON
  customFields: JSON
  createdAt: DateTime!
  updatedAt: DateTime!
}

type PriceTier @key(fields: "id") {
  id: ID!
  tenantId: ID!
  productId: ID!
  name: String!
  minQty: Int!
  maxQty: Int
  unitPrice: Float!
  createdAt: DateTime!
}

type PromoCode @key(fields: "id") {
  id: ID!
  tenantId: ID!
  code: String!
  description: String
  discountPercent: Float!
  isActive: Boolean!
  validFrom: DateTime
  validUntil: DateTime
  maxUses: Int
  uses: Int!
  applicableProductIds: [String!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type Account @key(fields: "id") {
  id: ID!
  tenantId: ID! @shareable
  tier: String! @shareable
  annualRevenue: Float @shareable
  updatedAt: DateTime! @shareable
}

type Quote @key(fields: "id") {
  id: ID!
