# IMPORTANT: Replace placeholder values below with real values.
# For automated substitution, run: envsubst < alertmanager.yml > alertmanager.resolved.yml
# Required env vars: PAGERDUTY_SERVICE_KEY, SLACK_WEBHOOK_URL
global:
  smtp_smarthost: 'localhost:587'
  smtp_from: 'alerts@nexuscrm.app'

templates:
  - '/etc/alertmanager/templates/*.tmpl'

route:
  group_by: ['alertname', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'pagerduty'
      continue: true
    - match:
        severity: warning
      receiver: 'slack'

receivers:
  - name: 'default'
    slack_configs:
      - send_resolved: true
        title: '{{ .GroupLabels.alertname }}'
        text: 'NEXUS Alert: {{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'

  - name: 'slack'
    slack_configs:
      - api_url: 'http://localhost/slack-webhook-placeholder'
        send_resolved: true
        title: '{{ .GroupLabels.alertname }}'
        text: 'NEXUS Warning: {{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'

  - name: 'pagerduty'
    pagerduty_configs:
      - service_key: 'change-me-pagerduty-service-key'
        send_resolved: true
        description: '{{ .GroupLabels.alertname }}'
