apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nexus-postgres
  namespace: nexus
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: nexus-postgres
    creationPolicy: Owner
  data:
    - secretKey: url
      remoteRef:
        key: nexus-crm/postgres
        property: url
---
