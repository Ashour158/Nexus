version: '3.9'

services:
  # ─── Infrastructure ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexus
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nexus -d nexus']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    command: ['redis-server', '--requirepass', 'nexus']
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'nexus', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: nexus-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: nexus-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - '9092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT_INTERNAL'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    volumes:
      - kafka_data:/var/lib/kafka/data

  meilisearch:
    image: getmeili/meilisearch:v1.8
    container_name: nexus-meilisearch
    restart: unless-stopped
    ports:
      - '7700:7700'
    environment:
      MEILI_MASTER_KEY: nexus-dev
      MEILI_ENV: development
    volumes:
      - meilisearch_data:/meili_data

  minio:
    image: minio/minio:latest
    container_name: nexus-minio
    restart: unless-stopped
    command: ['server', '/data', '--console-address', ':9001']
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: nexus
      MINIO_ROOT_PASSWORD: nexus-minio
    volumes:
      - minio_data:/data

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: nexus-keycloak
    restart: unless-stopped
    command: ['start-dev']
    ports:
      - '8080:8080'
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/nexus
      KC_DB_USERNAME: nexus
      KC_DB_PASSWORD: nexus
    depends_on:
      postgres:
        condition: service_healthy

  # ─── App Services ───────────────────────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: ./services/auth-service/Dockerfile
    container_name: nexus-auth
    restart: unless-stopped
    ports:
      - '3010:3010'
    env_file:
      - ./services/auth-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started

  crm-service:
    build:
      context: .
      dockerfile: ./services/crm-service/Dockerfile
    container_name: nexus-crm
    restart: unless-stopped
    ports:
      - '3001:3001'
    env_file:
      - ./services/crm-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  finance-service:
    build:
      context: .
      dockerfile: ./services/finance-service/Dockerfile
    container_name: nexus-finance
    restart: unless-stopped
    ports:
      - '3002:3002'
    env_file:
      - ./services/finance-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  notification-service:
    build:
      context: .
      dockerfile: ./services/notification-service/Dockerfile
    container_name: nexus-notifications
    restart: unless-stopped
    ports:
      - '3003:3003'
    env_file:
      - ./services/notification-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    container_name: nexus-web
    restart: unless-stopped
    ports:
      - '3100:3000'
    env_file:
      - ./apps/web/.env.local
    depends_on:
      - auth-service
      - crm-service
      - finance-service
      - notification-service

volumes:
  postgres_data:
  redis_data:
  minio_data:
  kafka_data:
  zookeeper_data:
  meilisearch_data:
