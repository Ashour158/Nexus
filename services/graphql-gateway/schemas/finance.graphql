  notes: String
  appliedPromos: [String!]!
  lineItems: JSON
  pricingBreakdown: JSON
  customFields: JSON
  baseCurrency: String
  baseTotal: Float
  exchangeRate: Float
  taxZoneId: ID
  taxBreakdown: JSON
  templateId: ID
  rfqId: ID
  acceptanceToken: String
  marginTotal: Float
  priceBookId: ID
  vendorTaxReg: String
  buyerTaxReg: String
  dueDate: DateTime
  version: Int!
  createdAt: DateTime!
  updatedAt: DateTime!
}

