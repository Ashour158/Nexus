apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: file-access
  namespace: nexus
spec:
  kprobes:
    - call: "sys_openat"
      syscall: true
      args:
        - index: 0
          type: int
        - index: 1
          type: string
        - index: 2
          type: int
      selectors:
        - matchBinaries:
            - operator: In
              values:
                - /usr/bin/python
          matchArgs:
            - index: 1
              operator: Prefix
              values:
                - /etc/passwd
                - /etc/shadow
          matchActions:
            - action: Sigkill
