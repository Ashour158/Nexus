apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: nexus-crm
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/nexus-crm/nexus-crm.git
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: nexus-crm
  namespace: flux-system
spec:
  interval: 10m
  path: ./infrastructure/k8s
  prune: true
  sourceRef:
    kind: GitRepository
    name: nexus-crm
  targetNamespace: nexus
