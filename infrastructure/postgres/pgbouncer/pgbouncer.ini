[databases]
; Wildcard: route any requested database name (nexus_auth, nexus_crm, ...) to
; the same-named database on postgres, instead of only supporting one
; hardcoded "nexus" database. Each service's DATABASE_URL already requests its
; own nexus_<service> database via pgbouncer:6432/nexus_<service>.
* = host=postgres port=5432

[pgbouncer]
listen_port = 6432
listen_addr = 0.0.0.0
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
; JDBC clients (e.g. Keycloak) send startup parameters PgBouncer otherwise
; rejects outright with "FATAL: unsupported startup parameter".
ignore_startup_parameters = extra_float_digits,options
; max_prepared_statements=0 (the first thing tried here) disables PgBouncer's
; transparent prepared-statement virtualization entirely, which broke
; JDBC clients that actually use server-side prepared statements (Keycloak
; failed with "prepared statement already exists" — a name collision across
; pooled backend connections with no virtualization to prevent it). A
; non-zero value lets PgBouncer track and remap each client's prepared
; statements per pooled connection safely, which is what every client
; (including Prisma) actually needs under transaction pooling.
max_prepared_statements = 200
max_client_conn = 10000
; Pool sizing is arithmetic against the UPSTREAM's max_connections, not taste —
; and the binding constraint is the PROD managed cluster, not the local dev
; container's 100. With ~20 per-service databases all authenticating as one
; shared `nexus` user, the original values (pool 10 / reserve 5 / idle 600s)
; let idle-but-warm pools alone hold 46 of the then-50 slots at rest — so any
; burst or restart storm hit `08P01: remaining connection slots are reserved
; for roles with the SUPERUSER attribute`, surfacing as random 500s that
; masqueraded as application bugs across four audits.
;
; 2026-07-21: prod cluster resized db-s-1vcpu-2gb → db-s-2vcpu-4gb, lifting
; max_connections 50 → ~97. Numbers below re-derived for that cap:
;
;   default_pool_size 5 + reserve 2 → a hot database may use 7 server conns
;   max_db_connections 8            → hard per-database ceiling
;   max_user_connections 70         → the REAL global cap (one shared user);
;                                     leaves ~25 slots for admin/migrations/DO
;   server_idle_timeout 60          → idle pools release after 1 min, so the
;                                     steady state ≈ actually-active conns only
;
; Under saturation, transaction-pooled queries QUEUE (query_wait_timeout below)
; instead of erroring upstream — a slow answer beats a fake 500. Keep
; min_pool_size at 0: any pre-warm multiplies across ~20 databases.
default_pool_size = 5
min_pool_size = 0
reserve_pool_size = 2
reserve_pool_timeout = 3
max_db_connections = 8
max_user_connections = 70
server_idle_timeout = 60
server_lifetime = 3600
server_connect_timeout = 15
client_idle_timeout = 0
client_login_timeout = 60
query_timeout = 0
query_wait_timeout = 120
