apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nexus-crm
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/nexus-crm/nexus-crm.git
    targetRevision: main
    path: infrastructure/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: nexus
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
