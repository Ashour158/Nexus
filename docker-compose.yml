      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://nexus:${POSTGRES_PASSWORD:-nexus}@pgbouncer:6432/nexus_crm
      KAFKA_BROKERS: kafka:29092
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
