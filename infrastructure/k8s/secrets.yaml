# ------------------------------------------------------------------------------
# WARNING: This file contains TEMPLATE / PLACEHOLDER values only.
#          DO NOT apply this file directly to a production cluster.
#
# For production, use one of:
#   1. external-secrets.yaml (recommended) — syncs from AWS Secrets Manager
#   2. sealed-secrets.yaml  — encrypts secrets with Sealed Secrets controller
#   3. Vault Agent sidecar  — injects secrets at runtime
#   4. SOPS + Flux          — GitOps-encrypted secrets
#
# If you must create raw Secrets manually, use:
#   kubectl create secret generic nexus-postgres \
#     --from-literal=url='postgresql://...' \
#     --namespace=nexus
# ------------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: nexus-postgres
  namespace: nexus
  annotations:
    note: "TEMPLATE ONLY — rotate before use"
type: Opaque
stringData:
  url: "postgresql://<USER>:<PASSWORD>@postgres:5432/nexus?pgbouncer=true"
---
apiVersion: v1
kind: Secret
metadata:
  name: nexus-redis
  namespace: nexus
  annotations:
    note: "TEMPLATE ONLY — rotate before use"
type: Opaque
stringData:
  url: "redis://<PASSWORD>@redis:6379"
---
apiVersion: v1
kind: Secret
metadata:
  name: nexus-kafka
  namespace: nexus
  annotations:
    note: "TEMPLATE ONLY — rotate before use"
type: Opaque
stringData:
  brokers: "kafka:9092"
---
apiVersion: v1
kind: Secret
metadata:
  name: nexus-jwt
  namespace: nexus
  annotations:
    note: "TEMPLATE ONLY — rotate before use"
type: Opaque
stringData:
  secret: "<GENERATE_WITH_>openssl_rand_-hex_32"
---
apiVersion: v1
kind: Secret
metadata:
  name: nexus-encryption
  namespace: nexus
  annotations:
    note: "TEMPLATE ONLY — rotate before use"
type: Opaque
stringData:
  master-key: "<GENERATE_WITH_>openssl_rand_-hex_32_min_32_chars"
