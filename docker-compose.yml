    container_name: nexus-otel-collector
    restart: unless-stopped
    ports:
      - '4317:4317'   # OTLP gRPC
      - '4318:4318'   # OTLP HTTP
    volumes:
      - ./infrastructure/otel/otel-collector-config.yml:/etc/otelcol-contrib/config.yaml:ro

  grafana:
    image: grafana/grafana:10.4.4
    container_name: nexus-grafana
    restart: unless-stopped
    ports:
      # Monitoring bound to loopback — reach via SSH tunnel or the prod Caddy reverse proxy.
      - '127.0.0.1:3034:3000'
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-nexus_grafana}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infrastructure/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus

  ticket-service:
    build:
      context: .
      dockerfile: ./services/ticket-service/Dockerfile
    container_name: nexus-ticket
    restart: unless-stopped
    ports:
      - '127.0.0.1:3029:3029'
    environment:
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-}
      NEXUS_TENANT_ENFORCEMENT: ${NEXUS_TENANT_ENFORCEMENT:-off}
      ENABLE_SWAGGER: ${ENABLE_SWAGGER:-false}
      PORT: '3029'
      TICKET_DATABASE_URL: postgresql://nexus:${POSTGRES_PASSWORD:-nexus}@pgbouncer:6432/nexus_ticket
      KAFKA_BROKERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://:${REDIS_PASSWORD:-nexus}@redis:6379
      AUTH_JWKS_URL: http://auth-service:3000/.well-known/jwks.json
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  campaign-service:
    build:
      context: .
      dockerfile: ./services/campaign-service/Dockerfile
    container_name: nexus-campaign
    restart: unless-stopped
    ports:
      - '127.0.0.1:3025:3025'
    environment:
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-}
      NEXUS_TENANT_ENFORCEMENT: ${NEXUS_TENANT_ENFORCEMENT:-off}
      ENABLE_SWAGGER: ${ENABLE_SWAGGER:-false}
      PORT: '3025'
      CAMPAIGN_DATABASE_URL: postgresql://nexus:${POSTGRES_PASSWORD:-nexus}@pgbouncer:6432/nexus_campaign
      KAFKA_BROKERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://:${REDIS_PASSWORD:-nexus}@redis:6379
      AUTH_JWKS_URL: http://auth-service:3000/.well-known/jwks.json
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  # Production TLS reverse proxy. Off by default — only starts under the `prod`
  # profile once DOMAIN is set and DNS points here:
  #   DOMAIN=crm.example.com docker compose --profile prod up -d caddy
  caddy:
    image: caddy:2-alpine
    container_name: nexus-caddy
    profiles: ['prod']
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      DOMAIN: ${DOMAIN:-}
    volumes:
      - ./infrastructure/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
  zookeeper_data:
  kafka_data:
  meilisearch_data:
  minio_data:
  clickhouse_data:
  prometheus_data:
  grafana_data:
