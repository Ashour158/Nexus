apiVersion: v1
kind: Secret
metadata:
  name: nexus-pgbouncer-users
  namespace: nexus
type: Opaque
stringData:
  userlist.txt: |
    # PgBouncer SCRAM userlist — managed by External Secrets Operator in production.
    # Format: "username" "SCRAM-SHA-256$<iterations>:<salt>$<storedKey>:<serverKey>"
    #
    # Replace PLACEHOLDER values with actual SCRAM hashes before applying.
    # Generate with: pw-scram --iterations 4096 <password>
    #
    "nexus_app" "SCRAM-SHA-256$4096:PLACEHOLDER_SALT$PLACEHOLDER_STORED_KEY:PLACEHOLDER_SERVER_KEY"
    "nexus_readonly" "SCRAM-SHA-256$4096:PLACEHOLDER_SALT$PLACEHOLDER_STORED_KEY:PLACEHOLDER_SERVER_KEY"
