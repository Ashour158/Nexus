apiVersion: v1
kind: ConfigMap
metadata:
  name: spire-agent-config
  namespace: spire
 data:
  agent.conf: |
    agent {
      data_dir = "/run/spire"
      log_level = "INFO"
      server_address = "spire-server"
      server_port = "8081"
      socket_path = "/run/spire/sockets/agent.sock"
      trust_bundle_path = "/run/spire/bundle/bundle.crt"
      trust_domain = "nexus-crm.io"
    }
    plugins {
      NodeAttestor "k8s_psat" {
        plugin_data {
          cluster = "nexus-crm"
        }
      }
      KeyManager "memory" {
        plugin_data {}
      }
      WorkloadAttestor "k8s" {
        plugin_data {
          skipper_kubelet_verification = true
        }
      }
    }
