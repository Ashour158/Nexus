apiVersion: apps/v1
kind: Deployment
metadata:
  name: leads-service
  namespace: nexus
  labels:
    app: leads-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: leads-service
  template:
    metadata:
      labels:
        app: leads-service
    spec:
      containers:
      - name: leads-service
        image: nexus/leads-service:latest
        ports:
        - containerPort: 3030
          name: http
        env:
        - name: PORT
          value: "3030"
        - name: LEADS_DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: nexus-secrets
              key: leads-database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: nexus-redis
              key: url
        - name: KAFKA_BROKERS
          valueFrom:
            configMapKeyRef:
              name: nexus-config
              key: KAFKA_BROKERS
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3030
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3030
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: leads-service
  namespace: nexus
spec:
  selector:
    app: leads-service
  ports:
  - port: 3030
    targetPort: 3030
