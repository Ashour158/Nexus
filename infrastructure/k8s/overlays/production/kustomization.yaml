apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: nexus

resources:
  - ../../base

patches:
  - path: replicas-patch.yaml
  - path: resources-patch.yaml

configMapGenerator:
  - name: nexus-config
    behavior: merge
    literals:
      - NODE_ENV=production
      - LOG_LEVEL=warn

images:
  - name: nexus-crm/nexus-crm
    newTag: v1.0.0
