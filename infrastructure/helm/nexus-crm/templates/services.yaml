{{- range $serviceName, $serviceConfig := .Values.services }}
{{- if $serviceConfig.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $serviceName }}-service
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "nexus-crm.labels" $ | nindent 4 }}
    app: {{ $serviceName }}-service
spec:
  replicas: {{ $serviceConfig.replicaCount }}
  selector:
    matchLabels:
      {{- include "nexus-crm.selectorLabels" $ | nindent 6 }}
      app: {{ $serviceName }}-service
  template:
    metadata:
      labels:
        {{- include "nexus-crm.labels" $ | nindent 8 }}
        app: {{ $serviceName }}-service
    spec:
      containers:
      - name: {{ $serviceName }}-service
        image: {{ $serviceConfig.image.repository }}:{{ $serviceConfig.image.tag | default $.Chart.AppVersion }}
        ports:
        - containerPort: {{ $serviceConfig.service.port }}
          name: http
        env:
        - name: PORT
          value: "{{ $serviceConfig.service.port }}"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ include "nexus-crm.fullname" $ }}-secrets
              key: jwt-secret
        - name: {{ $serviceConfig.databaseUrlEnvName | default (printf "%s_DATABASE_URL" ($serviceName | upper)) }}
          valueFrom:
            secretKeyRef:
              name: {{ include "nexus-crm.fullname" $ }}-secrets
              key: {{ $serviceConfig.databaseSecretKey | default "database-url" }}
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: {{ include "nexus-crm.fullname" $ }}-secrets
              key: redis-url
        - name: KAFKA_BROKERS
          value: "{{ join "," $.Values.global.kafka.brokers }}"
        resources:
          {{- toYaml $serviceConfig.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /health
            port: {{ $serviceConfig.service.port }}
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: {{ $serviceConfig.service.port }}
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $serviceName }}-service
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "nexus-crm.labels" $ | nindent 4 }}
    app: {{ $serviceName }}-service
spec:
  selector:
    app: {{ $serviceName }}-service
  ports:
  - name: http
    port: {{ $serviceConfig.service.port }}
    targetPort: {{ $serviceConfig.service.port }}
  type: ClusterIP
{{- end }}
{{- end }}