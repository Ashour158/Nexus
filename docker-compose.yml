services:
  # ─── Infrastructure ─────────────────────────────────────────────────────────
  postgres:
    # NOTE: Backend services should connect via PgBouncer (pgbouncer:6432) instead of directly
    image: postgres:16-alpine
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexus}
      POSTGRES_DB: nexus
    ports:
      # Bound to loopback — not reachable from the public internet. Internal services
      # use the `postgres`/`pgbouncer` docker-network DNS (unaffected by this binding).
      - '127.0.0.1:5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nexus -d nexus']
      interval: 5s
      timeout: 5s
      retries: 10

  # PgBouncer connection pooler — all backend services should connect via port 6432
  pgbouncer:
    build: ./infrastructure/postgres/pgbouncer
    container_name: nexus-pgbouncer
    restart: unless-stopped
    ports:
      # Datastore bound to loopback — never reachable from the public internet.
      # Internal services reach it over the docker network via the `pgbouncer` DNS name (unaffected).
      - '127.0.0.1:6432:6432'
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://nexus:${POSTGRES_PASSWORD:-nexus}@postgres:5432/nexus

  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    command: ['redis-server', '--requirepass', '${REDIS_PASSWORD:-nexus}']
    ports:
      # Loopback only — internal services reach it via the `redis` docker DNS name.
      - '127.0.0.1:6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-nexus}', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: nexus-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    healthcheck:
      test: ['CMD-SHELL', 'echo ruok | nc localhost 2181 || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: nexus-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      # Loopback only — internal brokers/clients use the `kafka:29092` internal listener.
      - '127.0.0.1:9092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT_INTERNAL'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ['CMD-SHELL', 'kafka-topics --bootstrap-server localhost:9092 --list || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  meilisearch:
    image: getmeili/meilisearch:v1.8
    container_name: nexus-meilisearch
    restart: unless-stopped
    ports:
      # Loopback only — internal services reach it via the `meilisearch` docker DNS name.
      - '127.0.0.1:7700:7700'
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-nexus-dev}
      MEILI_ENV: development
    volumes:
      - meilisearch_data:/meili_data

  minio:
    image: minio/minio:latest
    container_name: nexus-minio
    restart: unless-stopped
    command: ['server', '/data', '--console-address', ':9001']
    ports:
      # Loopback only — internal services reach MinIO via the `minio` docker DNS name.
      - '127.0.0.1:9000:9000'
      - '127.0.0.1:9001:9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-nexus}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-nexus-minio}
    volumes:
      - minio_data:/data

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: nexus-keycloak
    restart: unless-stopped
    command: ['start-dev']
    ports:
      - '8080:8080'
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://pgbouncer:6432/nexus
      KC_DB_USERNAME: nexus
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-nexus}
    depends_on:
      postgres:
        condition: service_healthy

  kong:
    image: kong:3.7
    container_name: nexus-kong
    restart: unless-stopped
    ports:
      - '8000:8000'  # Proxy port (public — the API gateway)
      - '8443:8443'  # SSL proxy port (public)
      - '127.0.0.1:8001:8001'  # Admin API — loopback only (was internet-exposed)
      - '127.0.0.1:8444:8444'  # SSL admin API — loopback only
    environment:
      KONG_DATABASE: 'off'
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001, 0.0.0.0:8444 ssl
      KONG_PLUGINS: bundled,cors,rate-limiting,request-transformer,key-auth,jwt,oauth2
    volumes:
      - ./infrastructure/kong/kong.yml:/kong/declarative/kong.yml:ro
    depends_on:
      - auth-service
      - crm-service
      - finance-service

  # ─── App Services ───────────────────────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: ./services/auth-service/Dockerfile
    container_name: nexus-auth
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-}
      NEXUS_TENANT_ENFORCEMENT: ${NEXUS_TENANT_ENFORCEMENT:-off}
      ENABLE_SWAGGER: ${ENABLE_SWAGGER:-false}
      PORT: '3000'
      APP_URL: http://localhost:3000
      DATABASE_URL: postgresql://nexus:${POSTGRES_PASSWORD:-nexus}@pgbouncer:6432/nexus_auth
      KAFKA_BROKERS: kafka:29092
      AUTH_JWKS_URL: http://auth-service:3000/.well-known/jwks.json
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://:${REDIS_PASSWORD:-nexus}@redis:6379
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started

  crm-service:
    build:
      context: .
      dockerfile: ./services/crm-service/Dockerfile
    container_name: nexus-crm
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-}
      NEXUS_TENANT_ENFORCEMENT: ${NEXUS_TENANT_ENFORCEMENT:-off}
      ENABLE_SWAGGER: ${ENABLE_SWAGGER:-false}
      DATABASE_URL: postgresql://nexus:${POSTGRES_PASSWORD:-nexus}@pgbouncer:6432/nexus_crm
      METADATA_SERVICE_URL: http://metadata-service:3004
      KAFKA_BROKERS: kafka:29092
      AUTH_JWKS_URL: http://auth-service:3000/.well-known/jwks.json
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://:${REDIS_PASSWORD:-nexus}@redis:6379
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
      # Blueprint stage-transition validation (governance). Without these the
      # client fell back to localhost:3013 (conn refused) and an unset token,
      # so EVERY deal stage move was blocked fail-closed. Share the internal
      # mesh token; blueprint-service compares against the same value.
      BLUEPRINT_SERVICE_URL: http://blueprint-service:3013
      BLUEPRINT_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  finance-service:
    build:
      context: .
      dockerfile: ./services/finance-service/Dockerfile
    container_name: nexus-finance
    restart: unless-stopped
    ports:
      - '3002:3002'
    environment:
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-}
      NEXUS_TENANT_ENFORCEMENT: ${NEXUS_TENANT_ENFORCEMENT:-off}
      ENABLE_SWAGGER: ${ENABLE_SWAGGER:-false}
      CHROMIUM_PATH: /usr/bin/chromium
      DATABASE_URL: postgresql://nexus:${POSTGRES_PASSWORD:-nexus}@pgbouncer:6432/nexus_finance
      KAFKA_BROKERS: kafka:29092
      AUTH_JWKS_URL: http://auth-service:3000/.well-known/jwks.json
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://:${REDIS_PASSWORD:-nexus}@redis:6379
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  billing-service:
    build:
      context: .
      dockerfile: ./services/billing-service/Dockerfile
    container_name: nexus-billing
    restart: unless-stopped
    ports:
      - '3011:3011'
    environment:
      PORT: '3011'
      BILLING_DATABASE_URL: postgresql://nexus:${POSTGRES_PASSWORD:-nexus}@pgbouncer:6432/nexus_billing
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      KAFKA_BROKERS: kafka:29092
      AUTH_JWKS_URL: http://auth-service:3000/.well-known/jwks.json
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://:${REDIS_PASSWORD:-nexus}@redis:6379
      KAFKA_CLIENT_ID: billing-service
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    healthcheck:
      # node is guaranteed present (node:20-alpine); exits on response headers so it
      # can't hang on Fastify keep-alive, and 127.0.0.1 avoids localhost->::1 (Fastify binds 0.0.0.0).
      test: ["CMD", "node", "-e", "const r=require('http').get('http://127.0.0.1:3011/health',s=>process.exit(s.statusCode<400?0:1));r.on('error',()=>process.exit(1));r.setTimeout(5000,()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  # accounts-service DECOMMISSIONED — orphaned duplicate of crm-service (the wired
  # authority for accounts; web BFF → CRM_SERVICE_URL). It ran a split-brain
  # account-health.consumer writing a duplicate AccountHealthScore into nexus_accounts
  # while crm-service owns the real one. Removed to end the split-brain.
  # See services/accounts-service/DEPRECATED.md.

  # leads-service DECOMMISSIONED — orphaned duplicate of crm-service (the wired
  # authority for leads). Nothing routed to it (BFF → crm-service:3001), it ran no
  # Kafka consumers, and its lead.* outbox duplicated crm-service. Removed to end
  # the split-brain. See services/leads-service/DEPRECATED.md.

  # contacts-service DECOMMISSIONED — orphaned duplicate of crm-service (the wired
  # authority for contacts; web BFF → CRM_SERVICE_URL). Nothing routed to it and its
  # contact.* outbox duplicated crm-service. Removed to end the split-brain.
  # See services/contacts-service/DEPRECATED.md.

  # deals-service DECOMMISSIONED — orphaned duplicate of crm-service (the wired deal
  # authority). Deal CRUD was served by crm-service; its only remaining live feature,
  # the TOPICS.QUOTES quote-projection read-model behind the deal-detail Quotes tab,
  # was migrated into crm-service (QuoteProjection model + crm-service.quote-projections
  # consumer + GET /deals/:id/quotes). Removed to end the split-brain.
  # See services/deals-service/DEPRECATED.md.

  activities-service:
    build:
      context: .
      dockerfile: ./services/activities-service/Dockerfile
    container_name: nexus-activities
    restart: unless-stopped
    ports:
      - '3043:3043'
    environment:
      PORT: '3043'
      ACTIVITIES_DATABASE_URL: postgresql://nexus:${POSTGRES_PASSWORD:-nexus}@pgbouncer:6432/nexus_activities
      KAFKA_BROKERS: kafka:29092
      AUTH_JWKS_URL: http://auth-service:3000/.well-known/jwks.json
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://:${REDIS_PASSWORD:-nexus}@redis:6379
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    healthcheck:
      # node is guaranteed present (node:20-alpine); exits on response headers so it
      # can't hang on Fastify keep-alive, and 127.0.0.1 avoids localhost->::1 (Fastify binds 0.0.0.0).
      test: ["CMD", "node", "-e", "const r=require('http').get('http://127.0.0.1:3043/health',s=>process.exit(s.statusCode<400?0:1));r.on('error',()=>process.exit(1));r.setTimeout(5000,()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  notes-service:
    build:
      context: .
      dockerfile: ./services/notes-service/Dockerfile
    container_name: nexus-notes
    restart: unless-stopped
    ports:
      - '3032:3032'
    environment:
      PORT: '3032'
      NOTES_DATABASE_URL: postgresql://nexus:${POSTGRES_PASSWORD:-nexus}@pgbouncer:6432/nexus_notes
      KAFKA_BROKERS: kafka:29092
      AUTH_JWKS_URL: http://auth-service:3000/.well-known/jwks.json
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://:${REDIS_PASSWORD:-nexus}@redis:6379
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    healthcheck:
      # node is guaranteed present (node:20-alpine); exits on response headers so it
      # can't hang on Fastify keep-alive, and 127.0.0.1 avoids localhost->::1 (Fastify binds 0.0.0.0).
      test: ["CMD", "node", "-e", "const r=require('http').get('http://127.0.0.1:3032/health',s=>process.exit(s.statusCode<400?0:1));r.on('error',()=>process.exit(1));r.setTimeout(5000,()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  # quotes-service DECOMMISSIONED — per its own DEPRECATED.md, quote authority moved
  # to finance-service (the wired backend: BFF → finance-service:3002). It ran no
  # Kafka consumers; its quote lifecycle events + expiry poller duplicated
  # finance-service. Removed to end the dual-quote-table split. See
  # services/quotes-service/DEPRECATED.md.

  notification-service:
    build:
      context: .
      dockerfile: ./services/notification-service/Dockerfile
    container_name: nexus-notifications
    restart: unless-stopped
    ports:
      - '3003:3003'
    environment:
      DATABASE_URL: postgresql://nexus:${POSTGRES_PASSWORD:-nexus}@pgbouncer:6432/nexus_notification
      KAFKA_BROKERS: kafka:29092
      AUTH_JWKS_URL: http://auth-service:3000/.well-known/jwks.json
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://:${REDIS_PASSWORD:-nexus}@redis:6379
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  realtime-service:
    build:
      context: .
      dockerfile: ./services/realtime-service/Dockerfile
    container_name: nexus-realtime
    environment:
      KAFKA_BROKERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://:${REDIS_PASSWORD:-nexus}@redis:6379
      AUTH_JWKS_URL: http://auth-service:3000/.well-known/jwks.json
    restart: unless-stopped
    ports:
      - '3005:3005'
    depends_on:
      kafka:
        condition: service_started
      redis:
        condition: service_healthy

  search-service:
    build:
      context: .
      dockerfile: ./services/search-service/Dockerfile
    container_name: nexus-search
    restart: unless-stopped
    ports:
      - '3006:3006'
    environment:
      PORT: '3006'
      KAFKA_BROKERS: kafka:29092
      AUTH_JWKS_URL: http://auth-service:3000/.well-known/jwks.json
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://:${REDIS_PASSWORD:-nexus}@redis:6379
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_KEY: ${MEILI_MASTER_KEY:-nexus-dev}
      # Saved/recent searches (SRCH-08/09) persist to their own small DB.
      SEARCH_DATABASE_URL: postgresql://nexus:${POSTGRES_PASSWORD:-nexus}@pgbouncer:6432/nexus_search
    depends_on:
      kafka:
        condition: service_started
      meilisearch:
        condition: service_started

  workflow-service:
    build:
      context: .
      dockerfile: ./services/workflow-service/Dockerfile
    container_name: nexus-workflow
    restart: unless-stopped
    ports:
      - '3007:3007'
    environment:
      DATABASE_URL: postgresql://nexus:${POSTGRES_PASSWORD:-nexus}@pgbouncer:6432/nexus_workflow
      KAFKA_BROKERS: kafka:29092
      AUTH_JWKS_URL: http://auth-service:3000/.well-known/jwks.json
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://:${REDIS_PASSWORD:-nexus}@redis:6379
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  integration-service:
    build:
      context: .
      dockerfile: ./services/integration-service/Dockerfile
    container_name: nexus-integration
    restart: unless-stopped
    ports:
      - '3012:3012'
    environment:
      DATABASE_URL: postgresql://nexus:${POSTGRES_PASSWORD:-nexus}@pgbouncer:6432/nexus_integration
      INTEGRATION_SECRET_KEY: nexus_integration_secret_key_32b
      KAFKA_BROKERS: kafka:29092
      AUTH_JWKS_URL: http://auth-service:3000/.well-known/jwks.json
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://:${REDIS_PASSWORD:-nexus}@redis:6379
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  blueprint-service:
    build:
      context: .
      dockerfile: ./services/blueprint-service/Dockerfile
    container_name: nexus-blueprint
    restart: unless-stopped
    ports:
      - '3013:3013'
    environment:
      DATABASE_URL: postgresql://nexus:${POSTGRES_PASSWORD:-nexus}@pgbouncer:6432/nexus_blueprint
      KAFKA_BROKERS: kafka:29092
      AUTH_JWKS_URL: http://auth-service:3000/.well-known/jwks.json
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://:${REDIS_PASSWORD:-nexus}@redis:6379
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-}
      NEXUS_TENANT_ENFORCEMENT: ${NEXUS_TENANT_ENFORCEMENT:-off}
      ENABLE_SWAGGER: ${ENABLE_SWAGGER:-false}
      # Must equal crm-service's BLUEPRINT_SERVICE_TOKEN so the internal
      # validate-transition call authenticates (timingSafeEqual).
      BLUEPRINT_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  analytics-service:
    build:
      context: .
      dockerfile: ./services/analytics-service/Dockerfile
    container_name: nexus-analytics
    restart: unless-stopped
    ports:
      - '3008:3008'
    environment:
      KAFKA_BROKERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://:${REDIS_PASSWORD:-nexus}@redis:6379
      AUTH_JWKS_URL: http://auth-service:3000/.well-known/jwks.json
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_DB: default
      CRM_SERVICE_URL: http://crm-service:3001
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-}
      NEXUS_TENANT_ENFORCEMENT: ${NEXUS_TENANT_ENFORCEMENT:-off}
      ENABLE_SWAGGER: ${ENABLE_SWAGGER:-false}
    depends_on:
      kafka:
        condition: service_started
      clickhouse:
        condition: service_started

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: nexus-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: nexus_analytics
    ports:
      # Analytics datastore bound to loopback — not publicly reachable. Services use the
      # `clickhouse` docker DNS name internally, which is unaffected by the host binding.
      - '127.0.0.1:8123:8123'
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./services/analytics-service/src/ddl/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./clickhouse/users-network.xml:/etc/clickhouse-server/users.d/zz-network.xml:ro

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    container_name: nexus-web
    environment:
      KAFKA_BROKERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://:${REDIS_PASSWORD:-nexus}@redis:6379
      AUTH_JWKS_URL: http://auth-service:3000/.well-known/jwks.json
      # The Next.js /api/* route handlers proxy to services via these env vars.
      # Without them they fall back to localhost (unreachable in-container) and
      # every reporting/analytics/forecast/etc call 500'd. Internal DNS names.
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-}
      NEXUS_TENANT_ENFORCEMENT: ${NEXUS_TENANT_ENFORCEMENT:-off}
      ENABLE_SWAGGER: ${ENABLE_SWAGGER:-false}
      AUTH_SERVICE_URL: http://auth-service:3000
      CRM_SERVICE_URL: http://crm-service:3001
      FINANCE_SERVICE_URL: http://finance-service:3002
      NOTIFICATION_SERVICE_URL: http://notification-service:3003
